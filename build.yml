name: Build Windows EXE

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.21.0

      - name: Build single EXE
        run: >
          pyinstaller --onefile --windowed --name sc_recorder --noupx
          --add-data "web;web"
          --hidden-import psutil --hidden-import flask --hidden-import requests
          --hidden-import boto3 --hidden-import botocore --hidden-import waitress
          --hidden-import tkinter
          --collect-data botocore
          sc_recorder.py

      # 테스트용 빌드 산출물(Actions 실행 화면에서 받을 수 있음). 공개 릴리스는 건드리지 않음.
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: sc_recorder-windows
          path: dist/sc_recorder.exe

      # ── 자동 'latest' 릴리스 게시 단계 제거됨 ──
      # 사용자 배포본은 Releases에서 수동으로 v4(sc_recorder.zip) 고정.
      # 나중에 서명된 새 빌드가 준비되면 그때 수동으로 교체.

      # 버전 태그(v1.0 등)를 직접 달았을 때만 릴리스 게시
      - name: Publish Release (only on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sc_recorder.exe
