[build]
  command = "echo 'ENCORE is a static site — no build step'"
  functions = "netlify/functions"
  publish = "web"

[[redirects]]
  from = "/api/riot"
  to = "/.netlify/functions/riot"
  status = 200

[[redirects]]
  from = "/api/storage"
  to = "/.netlify/functions/storage"
  status = 200

[[redirects]]
  from = "/api/admin"
  to = "/.netlify/functions/admin"
  status = 200
