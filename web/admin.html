  <path d="M16.00 3.80 L19.12 12.11 L27.98 12.51 L21.04 18.04 L23.41 26.59 L16.00 21.70 L8.59 26.59 L10.96 18.04 L4.02 12.51 L12.88 12.11 Z" fill="none" stroke="#3A4354" stroke-width=".55" stroke-linejoin="round" opacity=".85"/></svg><b>ENCORE</b></div><p>스무 살의 우리에게 — 다시, 브루드워.</p><p class="ftr-by">만든이 <b>최성호</b> · <span class="hdl">veatbox</span></p></div><div class="ftr-legal"><nav class="ftr-legal-links"><a href="terms.html">이용약관</a><a href="privacy.html">개인정보처리방침</a></nav><p class="ftr-disc">ENCORE는 Blizzard Entertainment, Inc.가 제작·승인하거나 보증하지 않은 팬 제작 서비스입니다. StarCraft® 및 StarCraft®: Remastered는 미국 및 기타 국가에서 Blizzard Entertainment, Inc.의 상표 또는 등록상표입니다.</p></div></footer></div><script src="encore-common.js"></script>
<script src="encore-auth.js"></script>
<script>
(function(){
  var R = document.getElementById('admRoot');
  var ALL = [];
  var SEL = {};
  var Q = '';
  var TOKEN = null;
  var AKEY = 'encore_admin';   // 관리자 전용 세션 — 레코더(encore_session)와 분리

  function aget(){ try{ return JSON.parse(localStorage.getItem(AKEY)||'null'); }catch(e){ return null; } }
  function aset(v){ try{ if(v) localStorage.setItem(AKEY, JSON.stringify(v)); else localStorage.removeItem(AKEY); }catch(e){} }

  function shield(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.6-3 8.4-7 10-4-1.6-7-5.4-7-10V6l7-3z"/><path d="M9.4 12.2l1.9 1.9 3.4-3.8"/></svg>'; }

  /* ── 로그인 폼 ── */
  function renderLogin(msg, cls){
    R.innerHTML =
      '<div class="admlogin"><div class="phav">'+shield()+'</div>'
      + '<h2>관리자 로그인</h2>'
      + '<p class="admlsub">ENCORE 관리자 아이디와 비밀번호를 입력하세요.</p>'
      + '<div class="admlf">'
      +   '<label for="adu">아이디</label>'
      +   '<input id="adu" type="text" autocomplete="username" autocapitalize="off" spellcheck="false">'
      +   '<label for="adp">비밀번호</label>'
      +   '<input id="adp" type="password" autocomplete="current-password">'
      +   '<button id="adlbtn" class="admlbtn" type="button">로그인</button>'
      +   '<div class="admlerr'+(cls?' '+cls:'')+'" id="adlerr">'+(msg||'')+'</div>'
      + '</div></div>';
    var u=document.getElementById('adu'), p=document.getElementById('adp'), b=document.getElementById('adlbtn'), e=document.getElementById('adlerr');
    function submit(){
      var uu=(u.value||'').trim(), pp=p.value||'';
      if(!uu||!pp){ e.className='admlerr'; e.textContent='아이디와 비밀번호를 입력하세요.'; return; }
      b.disabled=true; b.textContent='확인 중…'; e.className='admlerr'; e.textContent='';
      EAuth.sbRpc('admin_login', {p_user:uu, p_pw:pp}).then(function(r){
        if(r && r.token){
          aset({token:r.token, username:r.username}); TOKEN=r.token;
          renderShell({name:r.username}); loadMatches();
        }else{
          b.disabled=false; b.textContent='로그인';
          e.className='admlerr'; e.textContent='아이디 또는 비밀번호가 올바르지 않습니다.';
          p.value=''; p.focus();
        }
      }).catch(function(){
        b.disabled=false; b.textContent='로그인';
        e.className='admlerr'; e.textContent='로그인 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.';
      });
    }
    b.addEventListener('click', submit);
    u.addEventListener('keydown', function(ev){ if(ev.key==='Enter'){ ev.preventDefault(); p.focus(); } });
    p.addEventListener('keydown', function(ev){ if(ev.key==='Enter'){ ev.preventDefault(); submit(); } });
    setTimeout(function(){ u.focus(); }, 30);
  }

  async function doLogout(){
    try{ await EAuth.sbRpc('admin_logout', {p_token:TOKEN}); }catch(e){}
    aset(null); TOKEN=null; renderLogin('로그아웃되었습니다.', 'ok');
  }

  function playersOf(m){ var ps=m&&m.players; if(typeof ps==='string'){ try{ps=JSON.parse(ps);}catch(e){ps=[];} } return Array.isArray(ps)?ps:[]; }
  function hay(m){
    return [m.id, m.map, m.matchup, m.saver].concat(playersOf(m).map(function(p){return p&&p.name;}))
      .filter(Boolean).join(' ').toLowerCase();
  }
  function filtered(){
    if(!Q) return ALL;
    var q = Q.toLowerCase();
    return ALL.filter(function(m){ return hay(m).indexOf(q) >= 0; });
  }
  function selCount(){ var n=0; for(var k in SEL) if(SEL[k]) n++; return n; }
  function setStatus(msg, cls){
    var el = document.getElementById('admst'); if(!el) return;
    el.textContent = msg || ''; el.className = 'admst' + (cls ? ' '+cls : '');
  }

  function rowHTML(m){
    var on = !!SEL[m.id];
    var th = m.thumb ? ' style="background-image:url(\''+esc(m.thumb)+'\')"' : '';
    var np = m.np ? (m.np + '인') : '';
    return '<div class="admrow'+(on?' sel':'')+'" data-id="'+esc(m.id)+'">'
      + '<input type="checkbox" class="admck" data-ck="1"'+(on?' checked':'')+' aria-label="선택">'
      + '<div class="admth"'+th+'></div>'
      + '<div class="admmain"><div class="admmap">'+esc(m.map||'—')
      +   (m.matchup?'<span class="mu">'+esc(m.matchup)+'</span>':'')+'</div>'
      +   '<div class="admby"><b>'+esc(mapName(m.saver)||'—')+'</b> · '+esc(fdate(m.uploaded))
      +   (np?' · '+np:'')+(m.length?' · '+esc(m.length):'')+'</div></div>'
      + '<div class="admmeta">조회 '+(m.views||0)+'<br>추천 '+(m.likes||0)+'</div>'
      + '<div class="admacts"><a class="admgo" href="match.html?id='+encodeURIComponent(m.id)+'" target="_blank" rel="noopener">보기</a>'
      + '<button class="admdel" data-del="1" type="button">삭제</button></div></div>';
  }
  function renderList(){
    var list = document.getElementById('admlist'); if(!list) return;
    var rows = filtered();
    list.innerHTML = rows.length
      ? rows.map(rowHTML).join('')
      : '<div class="admempty">'+(Q ? '검색 결과가 없어요.' : '등록된 경기가 없어요.')+'</div>';
    var n = selCount();
    var bulk = document.getElementById('admbulk');
    if(bulk){ bulk.disabled = !n; bulk.textContent = n ? ('선택 삭제 ('+n+')') : '선택 삭제'; }
    var cnt = document.getElementById('admcnt');
    if(cnt) cnt.textContent = Q ? (rows.length+' / '+ALL.length) : String(ALL.length);
    var all = document.getElementById('admall');
    if(all){ all.checked = rows.length>0 && rows.every(function(m){return SEL[m.id];}); }
  }

  function renderShell(who){
    R.innerHTML =
      '<div class="admhero"><div class="admey">ADMIN CONSOLE</div>'
      + '<h1 class="admtitle">관리자 콘솔</h1>'
      + '<div class="admsub"><b>'+esc(who.name||who.username||'')+'</b> 계정으로 접속 중 · 삭제는 되돌릴 수 없어요. 영상·리플레이 파일은 레코더의 주기 청소가 회수합니다.</div></div>'
      + '<div class="admbar">'
      +   '<input id="admq" class="admq" type="search" placeholder="맵 · 매치업 · 플레이어 · 업로더 · ID 검색" autocomplete="off">'
      +   '<span class="admcnt"><span id="admcnt">0</span>경기</span>'
      +   '<label class="admsel"><input id="admall" type="checkbox" class="admck"> 전체선택</label>'
      +   '<button id="admbulk" class="admbtn danger" type="button" disabled>선택 삭제</button>'
      +   '<button id="admrefresh" class="admbtn" type="button">새로고침</button>'
      +   '<button id="admlogout" class="admbtn" type="button">로그아웃</button>'
      + '</div>'
      + '<div id="admst" class="admst"></div>'
      + '<div id="admlist" class="admlist"><div class="meload">경기 목록 불러오는 중…</div></div>';

    document.getElementById('admq').addEventListener('input', function(){ Q = this.value.trim(); renderList(); });
    document.getElementById('admall').addEventListener('change', function(){
      var on = this.checked;
      filtered().forEach(function(m){ if(on) SEL[m.id]=true; else delete SEL[m.id]; });
      renderList();
    });
    document.getElementById('admbulk').addEventListener('click', function(){
      var ids = Object.keys(SEL).filter(function(k){return SEL[k];});
      if(ids.length) doDelete(ids);
    });
    document.getElementById('admrefresh').addEventListener('click', function(){ loadMatches(); });
    document.getElementById('admlogout').addEventListener('click', function(){ doLogout(); });
    document.getElementById('admlist').addEventListener('click', function(ev){
      var row = ev.target.closest('.admrow'); if(!row) return;
      var id = row.getAttribute('data-id');
      if(ev.target.closest('[data-del]')){ doDelete([id]); return; }
      if(ev.target.closest('[data-ck]')){
        if(ev.target.checked) SEL[id]=true; else delete SEL[id];
        renderList();
      }
    });
  }

  async function loadMatches(){
    setStatus('');
    var list = document.getElementById('admlist');
    if(list) list.innerHTML = '<div class="meload">경기 목록 불러오는 중…</div>';
    try{
      var r = await fetch(SB+'/rest/v1/matches?select=id,map,matchup,length,uploaded,saver,thumb,views,likes,np,players&order=uploaded.desc&limit=1000', {headers:H});
      if(!r.ok) throw new Error('HTTP '+r.status);
      ALL = await r.json();
      SEL = {};
      renderList();
    }catch(e){
      if(list) list.innerHTML = '<div class="admempty">목록을 불러오지 못했습니다. 네트워크 상태를 확인한 뒤 새로고침해 주세요.</div>';
    }
  }

  async function doDelete(ids){
    var label = ids.length===1 ? '이 경기 1건' : ids.length+'건';
    if(!confirm(label+'을 영구 삭제합니다.\n댓글도 함께 삭제되며 되돌릴 수 없어요. 계속할까요?')) return;
    var btns = document.querySelectorAll('.admdel,#admbulk');
    btns.forEach(function(b){ b.disabled = true; });
    setStatus('삭제 중…');
    try{
      var n = await EAuth.sbRpc('admin_delete_matches', { p_token: TOKEN, p_ids: ids });
      var gone = {}; ids.forEach(function(i){ gone[i]=true; delete SEL[i]; });
      ALL = ALL.filter(function(m){ return !gone[m.id]; });
      renderList();
      setStatus((typeof n==='number'?n:ids.length)+'건 삭제 완료', 'ok');
    }catch(e){
      setStatus('삭제 실패 — 관리자 세션이 만료되었을 수 있습니다. 로그아웃 후 다시 로그인해 주세요.', 'err');
      renderList();
    }
  }

  async function boot(){
    var s = aget();
    if(!s || !s.token){ renderLogin(''); return; }
    TOKEN = s.token;
    var who = null;
    try{ who = await EAuth.sbRpc('admin_whoami', { p_token: TOKEN }); }catch(e){}
    if(!who || !who.is_admin){
      aset(null); TOKEN=null;
      renderLogin('세션이 만료되었습니다. 다시 로그인해 주세요.');
      return;
    }
    renderShell({name:who.username});
    loadMatches();
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', boot); else boot();
})();
</script>
</body></html>
