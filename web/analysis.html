<style>
:root{
 --bg:#0C0D10;--surface:#131519;--surface2:#181B21;--hover:#1D2128;--well:#0E0F13;
 --ink:#ECEEF2;--ink2:#C5C9D0;--dim:#9AA0AA;--faint:#7A8496;
 --line:#1F232B;--line2:#2C313B;
 --acc:#5E6878;--acc-ink:#D7DFEA;--acc-soft:rgba(199,210,225,.10);--acc-line:rgba(199,210,225,.32);
 --win:#D7DFEA;--loss:#E8694C;--gold:#E0B441;--blue:#5BA3E0;--violet:#C07BE0;
 --h-battle:#F0703C;--h-tech:#3A56CC;--h-expand:#C07BE0;--h-drop:#E0A340;--h-gg:#E2526A;
 --r-ran:#5BA3E0;--r-zerg:#C07BE0;--r-toss:#E0B441;
 --fd:'Pretendard Variable','Pretendard','Apple SD Gothic Neo',system-ui,sans-serif;
 --fh:'Pretendard Variable','Pretendard',system-ui,sans-serif;
 --fm:'IBM Plex Mono',ui-monospace,monospace;
 --r1:9px;--r2:13px;--r3:17px;
 --sh:0 12px 32px -18px rgba(0,0,0,.7);
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:var(--fd);font-size:15px;line-height:1.55;
 -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-feature-settings:"ss01","cv01";letter-spacing:.005em}
a{color:inherit;text-decoration:none}
svg{display:block}
.mono{font-family:var(--fm);font-variant-numeric:tabular-nums}
::selection{background:var(--acc-soft)}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px;border:3px solid var(--bg)}::-webkit-scrollbar-track{background:transparent}
.ic{width:1em;height:1em;flex-shrink:0}

.wrap{max-width:1180px;margin:0 auto;padding:0 28px 120px}

/* ── top bar ── */
.bar{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--line)}.bar.scrolled{box-shadow:0 6px 22px rgba(0,0,0,.4)}
.bar.scrolled{border-color:var(--line)}
.bar-in{max-width:1180px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;gap:16px}
.brand{display:flex;align-items:center;gap:10px}
.brand .gem{width:18px;height:18px;border-radius:6px;background:linear-gradient(140deg,#7E9CFF,#3A56CC);
 box-shadow:0 0 0 1px rgba(255,255,255,.06) inset,0 4px 12px -3px rgba(199,210,225,.5);position:relative}
.brand .gem::after{content:"";position:absolute;inset:4px;border-radius:3px;background:linear-gradient(140deg,rgba(255,255,255,.25),transparent)}
.brand .lgmk{width:20px;height:20px;color:var(--ink)}
.brand b{font-family:var(--fh);font-weight:800;font-size:16px;letter-spacing:.2em}
.crumb{display:flex;align-items:center;gap:9px;font-family:var(--fm);font-size:12px;color:var(--faint)}
.crumb a{color:var(--dim);transition:color .15s}.crumb a:hover{color:var(--ink)}
.crumb .sep{opacity:.5}
.bar .sp{flex:1}
.live{display:inline-flex;align-items:center;gap:7px;white-space:nowrap;font-family:var(--fd);font-weight:500;font-size:12px;color:var(--ink2);background:var(--surface);border:1px solid var(--line);padding:8px 14px;border-radius:100px}
.live .d{position:relative;width:7px;height:7px;border-radius:50%;background:var(--acc-ink);box-shadow:0 0 7px rgba(214,224,238,.55)}
.live .d::after{content:"";position:absolute;inset:-4px;border-radius:50%;border:1.5px solid var(--acc);animation:livePulse 2.2s ease-out infinite}
@keyframes livePulse{0%{transform:scale(.5);opacity:.75}70%{opacity:0}100%{transform:scale(1.9);opacity:0}}
.btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--fd);font-weight:600;font-size:13.5px;
 padding:9px 15px;border-radius:var(--r1);cursor:pointer;transition:.15s;border:1px solid transparent;white-space:nowrap}
.btn .ic{width:16px;height:16px}
.btn.ghost{background:var(--surface);border-color:var(--line);color:var(--ink2)}
.btn.ghost:hover{border-color:var(--line2);background:var(--hover);color:var(--ink)}
.btn:focus-visible{outline:none;box-shadow:0 0 0 3px var(--acc-soft)}

/* ── hero (broadcast) ── */
.hero{padding:38px 0 26px}
.eyebrow{display:inline-flex;align-items:center;gap:10px;font-family:var(--fm);font-weight:600;font-size:11px;letter-spacing:.3em;color:var(--acc-ink);text-transform:uppercase;margin-bottom:18px}
.eyebrow::before{content:"";width:24px;height:2px;border-radius:2px;background:linear-gradient(90deg,var(--acc),rgba(199,210,225,0))}
.htitle{display:flex;align-items:stretch;gap:16px}
.htitle .tbar{flex:0 0 auto;width:4px;min-height:42px;border-radius:3px;background:linear-gradient(180deg,var(--acc-ink),var(--acc));box-shadow:0 0 20px -2px rgba(214,224,238,.45)}
.title{font-family:var(--fh);font-weight:800;font-size:clamp(30px,4.8vw,46px);line-height:1.02;letter-spacing:-.024em;margin:0;color:#F4F2EC;align-self:center}
.meta{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:20px}
.chip{display:inline-flex;align-items:center;gap:8px;font-family:var(--fm);font-weight:600;font-size:12px;letter-spacing:.06em;text-transform:uppercase;
 padding:8px 13px;border-radius:6px;background:var(--surface);border:1px solid var(--line);color:var(--dim)}
.chip .ic{width:13px;height:13px;color:var(--faint)}
.chip b{font-family:var(--fh);font-weight:800;font-size:13.5px;font-variant-numeric:tabular-nums;color:#fff;letter-spacing:0;text-transform:none}
.chip.fmt{background:var(--acc-soft);border-color:var(--acc-line)}
.chip.fmt b{color:var(--acc-ink)}
.chip.win{background:var(--acc-soft);border-color:var(--acc-line);color:var(--acc-ink)}
.chip.win .ic{color:var(--win,#D7DFEA)}
.chip.dl{cursor:pointer;text-decoration:none;background:var(--acc-soft);border-color:var(--acc-line);color:var(--acc-ink);transition:background .15s,border-color .15s}
.chip.dl:hover{background:rgba(199,210,225,.16);border-color:var(--acc-ink)}
.chip.dl .ic{color:var(--acc-ink)}

/* ── video ── */
.stage{position:relative;aspect-ratio:16/9;width:100%;max-height:none;border-radius:var(--r3);overflow:hidden;
 background:#0A0A08;border:1px solid var(--line2);box-shadow:0 40px 90px -52px #000}
.stage video{width:100%;height:100%;object-fit:contain;background:#000;display:block}
/* 모바일: 가로폭 100% + 영상 실제 비율대로 세로 결정 → 여백 없음(잘림 없음). _fitAR이 stage에 인라인 aspect-ratio를 영상 비율로 넣으므로 contain이어도 레터박스가 안 생김. 화면을 넘지 않게 상한만 유지 */
@media(max-width:600px){
  .stage:not(.mvon):not(:fullscreen){width:100%;max-height:92vh}
}
.stage:fullscreen,.stage:-webkit-full-screen{width:100vw;height:100vh;max-height:none;aspect-ratio:auto!important;border-radius:0;background:#000}
.stage:fullscreen video,.stage:-webkit-full-screen video{width:100%;height:100%;object-fit:contain}
.vwrap{position:absolute;inset:0}
#vid{transition:filter .55s ease,transform .55s ease,opacity .22s ease}
#vid.vblur{filter:blur(22px) brightness(.85) saturate(.92);transform:scale(1.07)}
.vwrap video{transition:opacity .22s ease}
/* 단일뷰 커스텀 컨트롤 바 (#2) */
.svctl{position:absolute;left:0;right:0;bottom:0;z-index:7;display:flex;align-items:center;gap:12px;padding:18px 14px 12px;background:linear-gradient(0deg,rgba(5,7,11,.9) 0%,rgba(5,7,11,.52) 55%,rgba(5,7,11,0) 100%);opacity:0;transform:translateY(6px);transition:opacity .2s ease,transform .2s ease;pointer-events:none}
.svctl.show{opacity:1;transform:none;pointer-events:auto}
/* 전체화면: 멀티뷰와 동일한 부유 글래스 필 */
.stage.fs-on .svctl{left:0;right:0;margin:0 auto;bottom:14px;width:min(860px,94vw);border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(10,12,18,.66);-webkit-backdrop-filter:blur(16px) saturate(150%);backdrop-filter:blur(16px) saturate(150%);box-shadow:0 14px 40px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.10);padding:11px 15px}
.svmini{position:absolute;left:0;right:0;bottom:0;height:3px;z-index:6;background:rgba(255,255,255,.14);pointer-events:none;opacity:0;transition:opacity .3s ease}
.svmini.on{opacity:1}
.svmini i{display:block;height:100%;width:var(--mp,0%);background:var(--acc);box-shadow:0 0 7px var(--acc)}
.svctl.show ~ .svmini{opacity:0!important}
.svspin{position:absolute;top:50%;left:50%;width:54px;height:54px;margin:-27px 0 0 -27px;z-index:6;border:3px solid rgba(255,255,255,.2);border-top-color:var(--acc);border-radius:50%;opacity:0;pointer-events:none;transition:opacity .18s ease}
.svspin.on{opacity:1;animation:svspin .8s linear infinite}
@keyframes svspin{to{transform:rotate(360deg)}}
.stage:fullscreen .svmini,.stage:-webkit-full-screen .svmini,.stage.fs-on .svmini{opacity:0!important;display:none}
.svpp{flex:0 0 auto;width:40px;height:40px;border-radius:50%;background:linear-gradient(180deg,rgba(214,224,238,.16),rgba(214,224,238,.08));border:1px solid rgba(214,224,238,.28);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 3px 10px rgba(0,0,0,.35);transition:.15s}
.svpp svg{width:18px;height:18px}.svpp:hover{background:linear-gradient(180deg,rgba(214,224,238,.26),rgba(214,224,238,.12));transform:scale(1.05)}.svpp:active{transform:scale(.94)}
.svsc{position:relative;flex:1;display:flex;align-items:center;min-width:0}
.svrange{-webkit-appearance:none;appearance:none;width:100%;height:5px;border-radius:99px;cursor:pointer;outline:none;margin:0;transition:height .15s;background:linear-gradient(90deg,color-mix(in srgb,var(--acc) 70%,#fff) 0%,var(--acc) var(--p,0%),rgba(255,255,255,.16) var(--p,0%),rgba(255,255,255,.16) 100%)}
.svrange:hover,.svrange:active{height:8px}
.svrange::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.14),0 1px 6px rgba(0,0,0,.6);cursor:pointer;border:0;transition:transform .12s}
.svrange:hover::-webkit-slider-thumb{transform:scale(1.15)}
.svrange::-moz-range-thumb{width:14px;height:14px;border:0;border-radius:50%;background:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.14),0 1px 6px rgba(0,0,0,.6);cursor:pointer}
.svtime{flex:0 0 auto;font-family:var(--fm);font-size:12.5px;color:#dfe4ec;white-space:nowrap;font-variant-numeric:tabular-nums}
.svtime b{color:#fff;font-weight:600}
.svbtn{flex:0 0 auto;height:34px;min-width:34px;padding:0 9px;border-radius:9px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);color:#e7ebf2;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:var(--fm);font-size:12px;font-weight:600;line-height:1}
.svbtn:hover{background:rgba(255,255,255,.18)}.svbtn svg{width:16px;height:16px}
.svtip{position:absolute;bottom:26px;transform:translateX(-50%);background:rgba(5,7,11,.94);border:1px solid var(--line2);color:#fff;font-family:var(--fm);font-size:11px;padding:3px 7px;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .12s;font-variant-numeric:tabular-nums;z-index:8}
.svtip.show{opacity:1}
.svkbd{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:rgba(5,7,11,.82);color:#fff;font-family:var(--fm);font-size:14px;font-weight:600;padding:10px 16px;border-radius:13px;pointer-events:none;opacity:0;transition:opacity .18s;z-index:9;backdrop-filter:blur(4px)}
.svkbd.show{opacity:1}
@media(max-width:600px){.svctl{gap:9px;padding:16px 10px 10px}.svpp{width:36px;height:36px}.svtime{font-size:11.5px}.svbtn{height:32px;min-width:32px;padding:0 7px}.pl{gap:6px}.pl .pchip{padding:10px 8px;gap:6px}.pl .pchip .meb{padding:2px 4px;margin-left:-1px}}
/* 멀티뷰 슬레이브 재동기화 시머 (#8) */
.mvcell.mvseek::after{content:'';position:absolute;inset:0;background:linear-gradient(100deg,transparent 32%,rgba(214,224,238,.14) 50%,transparent 68%);background-size:220% 100%;animation:encShimmer 1.05s linear infinite;pointer-events:none;z-index:2}
.mvcell.mvseek .mvsync{opacity:1}
.mvsync{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:inline-flex;align-items:center;gap:8px;background:rgba(12,14,20,.62);color:#e6edff;font-family:var(--fd);font-size:12.5px;font-weight:600;padding:8px 15px;border-radius:999px;border:1px solid rgba(126,156,255,.22);-webkit-backdrop-filter:blur(7px);backdrop-filter:blur(7px);pointer-events:none;opacity:0;transition:opacity .2s;z-index:3}.mvsync::before{content:"";width:12px;height:12px;border-radius:50%;border:2px solid rgba(214,224,238,.26);border-top-color:#D7DFEA;animation:encSpin .68s linear infinite;flex:0 0 auto}@keyframes encSpin{to{transform:rotate(360deg)}}
/* 재생 전 화면: 시네마틱 스크림(상하 비네트+하단 그라디언트) — 재생 시 vplay 와 함께 사라짐 */
.vplay{position:absolute;inset:0;border:0;display:grid;place-items:center;cursor:pointer;transition:opacity .4s ease;padding:0;
  background:radial-gradient(130% 95% at 50% 110%,rgba(5,7,12,.58),transparent 55%),
             radial-gradient(150% 105% at 50% -25%,rgba(5,7,12,.5),transparent 52%),
             linear-gradient(180deg,rgba(5,7,12,.16),rgba(5,7,12,.04) 42%,rgba(5,7,12,.34))}
.vplay:hover{filter:brightness(1.06)}
.vplay svg{width:76px;height:76px;color:#fff;background:rgba(14,18,28,.55);border:1.5px solid rgba(255,255,255,.32);border-radius:50%;padding:24px;box-sizing:border-box;
  -webkit-backdrop-filter:blur(10px) saturate(140%);backdrop-filter:blur(10px) saturate(140%);
  box-shadow:0 18px 50px -12px rgba(0,0,0,.75),inset 0 1px 0 rgba(255,255,255,.22),0 0 0 8px rgba(255,255,255,.05);transition:.2s;margin-left:3px;pointer-events:none}
.vplay:hover svg{transform:scale(1.06);border-color:rgba(255,255,255,.5);box-shadow:0 18px 50px -12px rgba(0,0,0,.75),inset 0 1px 0 rgba(255,255,255,.22),0 0 0 12px rgba(255,255,255,.07)}
.vcard{text-align:center;padding:22px;pointer-events:none;width:100%;max-width:840px}
.vctop{position:absolute;top:19px;left:24px;display:flex;align-items:center;gap:9px;font-family:var(--fh);font-weight:800;font-size:clamp(13px,1.9vw,18px);letter-spacing:.14em;color:#fff;text-shadow:0 2px 14px rgba(0,0,0,.8);z-index:2}
.vctop svg{width:clamp(15px,2vw,19px);height:auto;color:#fff;filter:drop-shadow(0 2px 10px rgba(0,0,0,.6))}
.vctop span{color:var(--acc-ink)}
.vctag{position:absolute;top:21px;right:24px;display:flex;align-items:center;gap:9px;font-family:var(--fm);font-weight:600;font-size:clamp(10px,1.2vw,12px);letter-spacing:.2em;text-transform:uppercase;color:rgba(236,238,242,.82);text-shadow:0 2px 12px rgba(0,0,0,.82);z-index:2}
.vctag .dot{width:5px;height:5px;border-radius:50%;background:var(--acc);box-shadow:0 0 8px var(--acc)}
.vcteams{display:flex;align-items:center;justify-content:center;gap:clamp(14px,4vw,54px)}
.vcside{flex:1;min-width:0;display:flex;flex-direction:column;gap:clamp(10px,2vw,18px)}
.vcside-l{align-items:flex-end;text-align:right}
.vcside-r{align-items:flex-start;text-align:left}
.vcside-c{align-items:center;text-align:center}
.vckick{font-family:var(--fm);font-weight:700;font-size:clamp(9.5px,1.1vw,12px);letter-spacing:.22em;text-transform:uppercase;color:rgba(236,238,242,.5);display:flex;align-items:center;gap:7px}
.vckick.won{color:var(--acc-ink)}
.vckick .wb{font-weight:700;color:#06203f;background:var(--acc-ink);padding:2px 6px;border-radius:4px;letter-spacing:.1em;font-size:.86em}
.vcplayer{min-width:0;max-width:100%}
.vcpn{font-family:var(--fh);font-weight:800;font-size:clamp(18px,2.9vw,33px);color:#fff;line-height:1.08;letter-spacing:-.014em;text-shadow:0 3px 22px rgba(0,0,0,.8);overflow-wrap:anywhere;word-break:break-word}
.vcpr{display:inline-flex;align-items:center;gap:7px;font-family:var(--fm);font-size:clamp(10px,1.1vw,11.5px);font-weight:600;letter-spacing:.14em;text-transform:uppercase;margin-top:8px;color:rgba(235,232,224,.66)}
.vcside-l .vcpr{flex-direction:row-reverse}

.mk:hover .lab{opacity:0}      /* hover 시엔 상세 툴팁으로 대체 */

    /* ===== 감독판 — 자동 시점 전환 ===== */
    const _povOwners=items.map(it=>({id:it.l.id,name:it.l.name,p:players.find(pp=>pp&&pp.name===it.l.name)||null}));
    function _seriesAt(series,gt){if(!series||!series.length)return 0;const bw=totalSec/series.length;let i=Math.floor(gt/bw);if(i<0)i=0;if(i>=series.length)i=series.length-1;return +series[i]||0;}
    // 임의 [a,b) 구간의 시계열 값 합 — 해상도 무관(apm=분, aggr=분, combat_fine=4초 모두 지원)
    function _seriesSum(series,a,b){
      if(!series||!series.length)return 0;const bw=totalSec/series.length;let s=0;
      const i0=Math.max(0,Math.floor(a/bw)),i1=Math.min(series.length-1,Math.floor((b-1e-6)/bw));
      for(let i=i0;i<=i1;i++)s+=(+series[i]||0);return s;
    }
    // 하이라이트 종류별 우선 가중(이벤트 홀드): 교전·GG 최우선 → 견제 → 테크/확장
    const _HLW={battle:130,gg:118,drop:92,tech:64,expand:58,scout:40};
    function _buildDirTrack(){
      const STEP=Math.max(6,totalSec/90);const STALE=Math.max(26,STEP*3);const bins=[];let prev=null,_staleRun=0;
      for(let t=0;t<totalSec;t+=STEP){
        // 1) 선수별 신호 원값 수집
        let cSum=0,aSum=0,mSum=0;
        const rows=_povOwners.map(pv=>{
          const p=pv.p;
          const c=p?_seriesSum(p.combat_fine,t,t+STEP):0;   // 정밀 교전 명령(지금 싸우는가)
          const ag=p?_seriesSum(p.aggr_series,t,t+STEP):0;  // 적진 근처 공격(공격 주도)
          const ap=p?_seriesSum(p.apm_series,t,t+STEP):0;   // 활동도(평시 베이스)
          cSum+=c;aSum+=ag;mSum+=ap;
          return {pv,c,ag,ap};
        });
        // 2) 그 순간 후보 사이 상대 점유율로 정규화 → 가중 합성 + 이벤트 홀드
        let best=(_povOwners[0]||{}).id,bestScore=-1,bestHold=0;
        rows.forEach(o=>{
          const cShare=cSum>0?o.c/cSum:0,aShare=aSum>0?o.ag/aSum:0,mShare=mSum>0?o.ap/mSum:0;
          let score=1.00*cShare+0.55*aShare+0.24*mShare;   // 교전>공격>활동 (활동 가중↓: 매크로 고정 완화)
          let hold=0;
          HL.forEach(h=>{if(h.who===o.pv.name&&h.sec>=t-8&&h.sec<=t+STEP+12){const w=_HLW[h.kind]||70;if(w>hold)hold=w;}});
          score+=hold;o._score=score;
          if(score>bestScore){bestScore=score;best=o.pv.id;bestHold=hold;}
        });
        // 3) 히스테리시스: 이벤트 주도 컷은 즉시, 평시 컷은 18%+ 우위일 때만(떨림 방지)
        if(prev&&best!==prev&&bestHold<=0){
          const pr=rows.find(o=>o.pv.id===prev);
          if(pr&&bestScore<pr._score*1.10+0.03)best=prev;
        }
        // 3.5) 지루함 방지: 한 시점에 오래 머물렀고 2위가 근소하면 강제 전환(평시에도 변화)
        if(best===prev)_staleRun++;else _staleRun=0;
        if(bestHold<=0&&_staleRun*STEP>=STALE){
          let alt=null,altS=-1;rows.forEach(o=>{if(o.pv.id!==best&&o._score>altS){altS=o._score;alt=o.pv.id;}});
          const bs=(rows.find(o=>o.pv.id===best)||{})._score||0;
          if(alt&&altS>0&&altS>=bs*0.82){best=alt;_staleRun=0;}
        }
        bins.push({t:t,id:best});prev=best;
      }
      // 4) 세그먼트화 + 짧은 컷 흡수(부드러움: 최소 지속 상향)
      const segs=[];bins.forEach(b=>{if(segs.length&&segs[segs.length-1].id===b.id)segs[segs.length-1].to=b.t+STEP;else segs.push({from:b.t,to:b.t+STEP,id:b.id});});
      const MIN=Math.max(9,STEP*1.4),out=[];
      segs.forEach(s=>{
        if(out.length&&out[out.length-1].id===s.id){out[out.length-1].to=s.to;return;}
        if(out.length&&(s.to-s.from)<MIN){out[out.length-1].to=s.to;return;}
        out.push({from:s.from,to:s.to,id:s.id});
      });
      return out;
    }
    let _dirTrack=null,_dirOn=false,_dirCur=null,_dirTimer=null,_dirLast=0,_dirWant=null,_dirWantAt=0;

      _cutEl.innerHTML='<i style="background:'+esc(l.color)+'"></i><b>'+esc(l.name)+'</b>'+(l.race?'<span class="r-'+esc(l.rk||'')+'">'+esc(l.race)+'</span>':'');
      _cutEl.classList.remove('show');void _cutEl.offsetWidth;_cutEl.classList.add('show');

    }
    function _dirPovAt(gt){if(!_dirTrack||!_dirTrack.length)return null;for(let i=_dirTrack.length-1;i>=0;i--){if(gt>=_dirTrack[i].from)return _dirTrack[i].id;}return _dirTrack[0].id;}
    function _dirStop(){_dirOn=false;if(_dirTimer){clearInterval(_dirTimer);_dirTimer=null;}if(_dirBtn)_dirBtn.classList.remove('on');if(_dirChip)_dirChip.style.display='none';}
    function _dirStart(){

      _dirTrack=_buildDirTrack();
      const onTab=tabs.querySelector('.povtab.on');_dirCur=onTab?onTab.dataset.id:String(MID);
      _dirOn=true;_dirLast=0;if(_dirBtn)_dirBtn.classList.add('on');if(_dirChip)_dirChip.style.display='';
      if(_dirTimer)clearInterval(_dirTimer);
      _dirTimer=setInterval(()=>{
        if(!_dirOn)return;const v=document.getElementById('vid');
        if(!v||!v.duration||v.seeking||v.readyState<2)return;
        const gt=Math.max(0,(v.currentTime||0)-OFF);if(gt<0.4)return;
        // 예측 예열: 다음 세그먼트 전환 12초 전부터 미리 디코딩 → 컷 시 웜 스왑(무공백)
        for(let i=0;i<_dirTrack.length;i++){
          if(gt>=_dirTrack[i].from&&gt<_dirTrack[i].to){

            break;
          }
        }
        if(Date.now()-_dirLast<1600)return;
        const want=_dirPovAt(gt);
        if(!want||want===_dirCur)return;
        const mv=vmap[want];if(!mv)return;
        if(_dirWant!==want){_dirWant=want;_dirWantAt=Date.now();}   // 전환 목표 변경 시각 기록
        // 예열이 목표 시점으로 준비됐는가 → 준비 시 무공백 웜 스왑, 미준비 시 예열 걸고 보류(콜드 스왑 회피)

      },300);
    }
    const _dirBtn=document.createElement('button');_dirBtn.className='povdir';_dirBtn.innerHTML='◆ 감독판';

    tabs.appendChild(_dirBtn);tabs.appendChild(_dirChip);
    _dirBtn.addEventListener('click',()=>{if(_dirOn)_dirStop();else _dirStart();});
    tabs.querySelectorAll('.povtab').forEach(btn=>{
      let _hv=0;

    // 폰에서는 분할 보기 비활성 — 영상 여러 개 동시 디코드가 무겁고(폰 하드웨어 디코더 1~3개)

function paintC(){clist.innerHTML=comments.length?comments.map(crow).join(''):'<div style="color:var(--faint);font-size:14px;padding:6px 0">첫 코멘트를 남겨보세요.</div>';}
paintC();
let likes=LIKES0||0,liked=false;try{liked=localStorage.getItem('liked_'+MID)==='1';}catch(e){}
const like=document.getElementById('like'),lc=document.getElementById('lc');
function paintL(){lc.textContent=likes;like.classList.toggle('on',liked);}
paintL();
like.onclick=()=>{liked=!liked;likes+=liked?1:-1;if(likes<0)likes=0;paintL();
 try{localStorage.setItem('liked_'+MID,liked?'1':'0');}catch(e){}
 fetch(SB+'/rest/v1/rpc/like_match',{method:'POST',headers:H,body:JSON.stringify({mid:MID,delta:liked?1:-1})}).then(r=>r.json()).then(n=>{if(typeof n==='number'){likes=n;paintL();}}).catch(()=>{});};
const cau=document.getElementById('cau');try{cau.value=localStorage.getItem('sc_id')||'';}catch(e){}
document.getElementById('csend').onclick=()=>{const author=cau.value.trim(),body=document.getElementById('cb').value.trim();if(!author||!body)return;
 try{localStorage.setItem('sc_id',author);}catch(e){}
 comments=comments.concat({author,body,created:new Date().toISOString()});paintC();document.getElementById('cb').value='';
 fetch(SB+'/rest/v1/comments',{method:'POST',headers:Object.assign({Prefer:'return=representation'},H),body:JSON.stringify({match_id:MID,author,body})}).then(r=>r.json()).then(rows=>{if(rows&&rows[0]){comments[comments.length-1]=rows[0];paintC();}}).catch(()=>{});};
