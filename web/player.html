const RACEKR={ran:"테란",zerg:"저그",toss:"프로토스"};
const RLET={ran:"T",zerg:"Z",toss:"P"};
const WEAK={prod:"생산기지 부족",up:"업그레이드 늦음",comp:"결정타 유닛 부족",det:"감지 수단 부족",exp:"멀티 소홀",army:"물량·조합 아쉬움",worker:"일꾼 부족",apm:"생산 끊김",scout:"정찰 부족",ctrl:"컨트롤 그룹 부족",cont:"생산 공백",harass:"견제 부족",bio:"바이오닉 조합"};
const STRONG={prod:"탄탄한 생산기지",up:"꾸준한 풀업",tech:"결정타 유닛 확보",exp:"멀티 운영",army:"두꺼운 물량",worker:"탄탄한 경제",scout:"빠른 정찰",ctrl:"세밀한 컨트롤",drop:"드랍 견제",cont:"높은 가동률"};
function parseA(m){try{return typeof m.analysis==="string"?JSON.parse(m.analysis||"{}"):(m.analysis||{});}catch(e){return null;}}
(async function(){
  const pf=document.getElementById("pf");
  document.title=(NAME||"선수")+" · ENCORE";
  if(!NAME){pf.innerHTML='<div class="pempty-c"><b>선수를 찾을 수 없어요</b></div>';return;}
  let all=[];
  try{all=await gj("matches?select=*&order=id.desc&limit=500");}
  catch(e){pf.innerHTML='<div class="pempty-c"><b>불러오기 실패</b><span>잠시 후 다시 시도해주세요</span></div>';return;}
  const games=[];
  all.forEach(function(m){var a=parseA(m);if(!a||!a.meta||!a.players)return;var me=a.players.find(function(p){return p.name===NAME;});if(!me)return;games.push({m:m,a:a,me:me});});
  if(!games.length){pf.innerHTML='<div class="pempty-c"><b>'+esc(NAME)+'</b><span>분석된 경기가 아직 없어요</span></div>';return;}
  var wins=0,apmS=0,apmN=0;var raceCnt={},weakG={},strongG={};
  games.forEach(function(g){var a=g.a,me=g.me;
    if(a.meta.winner!=null&&me.team===a.meta.winner)wins++;
    if(me.apm){apmS+=me.apm;apmN++;}
    var rk=me.race||"x";raceCnt[rk]=(raceCnt[rk]||0)+1;
    var pts=[];try{var rep=coach_report(a);var mine=rep.find(function(x){return x.id===me.id;})||rep.find(function(x){return x.name===me.name;});pts=mine?mine.points:[];}catch(e){}
    var sw={},ss={};
    pts.forEach(function(pt){
      if((pt.tone==="warn"||pt.tone==="tip")&&WEAK[pt.k]&&!sw[pt.k]){sw[pt.k]=1;weakG[pt.k]=(weakG[pt.k]||0)+1;}
      else if(pt.tone==="good"&&STRONG[pt.k]&&!ss[pt.k]){ss[pt.k]=1;strongG[pt.k]=(strongG[pt.k]||0)+1;}
    });
  });
  var N=games.length,winrate=Math.round(wins/N*100),avgApm=apmN?Math.round(apmS/apmN):0;
  var mainRaceK=Object.entries(raceCnt).sort(function(a,b){return b[1]-a[1];})[0][0];
  var rcClass=({ran:1,zerg:1,toss:1}[mainRaceK]?mainRaceK:"x");
  var mainRace=RACEKR[mainRaceK]||"랜덤";
  var th=Math.max(2,Math.ceil(N*0.3));
  var weakRank=Object.entries(weakG).filter(function(e){return e[1]>=th;}).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
  var strongRank=Object.entries(strongG).filter(function(e){return e[1]>=Math.max(2,Math.ceil(N*0.4));}).sort(function(a,b){return b[1]-a[1];}).slice(0,4);

  // 상대 종족별 전적 + head-to-head
  var muStat={ran:{w:0,n:0},zerg:{w:0,n:0},toss:{w:0,n:0}},h2h={};
  games.forEach(function(g){var a=g.a,me=g.me;
    var won=(a.meta.winner!=null&&me.team===a.meta.winner);
    var enemies=a.players.filter(function(p){return p.team!==me.team;});
    var seenR={};
    enemies.forEach(function(e){
      if(e.race&&muStat[e.race]&&!seenR[e.race]){seenR[e.race]=1;muStat[e.race].n++;if(won)muStat[e.race].w++;}
      if(e.name){if(!h2h[e.name])h2h[e.name]={w:0,n:0};h2h[e.name].n++;if(won)h2h[e.name].w++;}
    });
  });
  var muOrder=["ran","zerg","toss"].filter(function(r){return muStat[r].n>0;}).sort(function(a,b){return muStat[b].n-muStat[a].n;});
  var muRows=muOrder.map(function(r){var st=muStat[r],wr=Math.round(st.w/st.n*100);
    return '<div class="prow"><span class="pl">vs '+RACEKR[r]+'</span><span class="pn">'+st.w+'승 '+(st.n-st.w)+'패 · '+wr+'%</span><span class="pbar"><span class="rc-'+r+'" style="width:'+wr+'%"></span></span></div>';}).join('');
  var muCard='<div class="pcard"><h3>상대 종족별 전적</h3>'+(muRows||'<div class="pempty">기록 없음</div>')+'</div>';
  var h2List=Object.entries(h2h).filter(function(e){return e[1].n>=2;}).sort(function(a,b){return b[1].n-a[1].n;}).slice(0,6);
  var h2Rows=h2List.map(function(e){var st=e[1];return '<div class="prow"><span class="pl">'+esc(e[0])+'</span><span class="pn">'+st.w+'승 '+(st.n-st.w)+'패</span></div>';}).join('');
  var h2Card='<div class="pcard"><h3>자주 만난 상대</h3>'+(h2Rows||'<div class="pempty">2회 이상 만난 상대가 아직 없어요</div>')+'</div>';
  var recSec='<div class="pcols">'+muCard+h2Card+'</div>';
  var hero='<div class="phero"><div class="pav rc-'+rcClass+'">'+(RLET[mainRaceK]||"?")+'</div><div><h1>'+esc(NAME)+'</h1><p class="psub">'+mainRace+' · '+N+'경기 · 승률 '+winrate+'%</p></div></div>';
  var stats='<div class="pstats"><div class="ps"><div class="v">'+wins+'<span style="color:var(--faint);font-weight:600"> - </span>'+(N-wins)+'</div><div class="k">전적</div></div><div class="ps"><div class="v acc">'+winrate+'%</div><div class="k">승률</div></div><div class="ps"><div class="v">'+avgApm+'</div><div class="k">평균 APM</div></div><div class="ps"><div class="v">'+mainRace+'</div><div class="k">주 종족</div></div></div>';
  function rows(rank,tone){
    if(!rank.length)return '<div class="pempty">'+(tone==="warn"?"두드러진 반복 약점이 없어요 — 꾸준한 편이에요.":"경기가 더 쌓이면 강점이 집계돼요.")+'</div>';
    var mx=rank[0][1];
    return rank.map(function(e){var lbl=(tone==="warn"?WEAK:STRONG)[e[0]];
      return '<div class="prow '+tone+'"><span class="pl">'+lbl+'</span><span class="pn">'+N+'경기 중 '+e[1]+'회</span><span class="pbar"><span style="width:'+Math.round(e[1]/mx*100)+'%"></span></span></div>';}).join('');
  }
  var cols='<div class="pcols"><div class="pcard"><h3>반복되는 약점</h3>'+rows(weakRank,"warn")+'</div><div class="pcard"><h3>꾸준한 강점</h3>'+rows(strongRank,"good")+'</div></div>';
  var glist=games.map(function(g){var m=g.m,a=g.a,me=g.me;var won=(a.meta.winner!=null&&me.team===a.meta.winner);
    return '<a class="pg" href="match.html?id='+encodeURIComponent(m.id)+'"><span class="pgmap">'+esc(mapName(a.meta.map)||"리플레이")+'</span>'+(a.meta.matchup?'<span class="pgmu">'+esc(a.meta.matchup)+'</span>':'')+'<span class="pgres '+(won?"win":"loss")+'">'+(won?"승":"패")+'</span><span class="pglen">'+esc(a.meta.length||"")+'</span></a>';}).join('');
  var gsec='<div class="pgames"><h3>경기 기록 ('+N+')</h3>'+glist+'</div>';
  pf.innerHTML=hero+stats+recSec+cols+gsec;
})();
</script></body></html>
