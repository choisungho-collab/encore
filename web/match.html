<style>
:root{
 --bg:#080A0E;--surface:#0F131A;--surface2:#161B23;--hover:#1C2530;--well:#0B0E13;
 --ink:#ECE7DD;--ink2:#C2BBAD;--dim:#867F71;--faint:#6B6355;
 --line:#1F252E;--line2:#2B323C;
 --gold:#DEC79C;--gold-ink:#EFDDBC;--gold-soft:rgba(222,199,156,.11);--gold-line:rgba(222,199,156,.32);
 --win:#52C3AC;--win-soft:rgba(82,195,172,.12);--win-line:rgba(82,195,172,.42);
 --loss:#DE7480;--loss-soft:rgba(222,116,128,.12);--loss-line:rgba(222,116,128,.42);
 --blue:#3D9BE0;--blue-soft:rgba(61,155,224,.1);--blue-line:rgba(61,155,224,.34);
 --red:#E0563D;--red-soft:rgba(224,86,61,.1);--red-line:rgba(224,86,61,.34);
 --fd:'Pretendard Variable','Pretendard','Apple SD Gothic Neo',system-ui,sans-serif;
 --fs:'Chakra Petch','Saira','Pretendard Variable',sans-serif;
 --fg:'Sora',sans-serif;
 --fm:'IBM Plex Mono',ui-monospace,monospace;
 --r1:10px;--r2:14px;--r3:18px;--sh:0 18px 44px -22px rgba(0,0,0,.8);
}
*{box-sizing:border-box}html,body{margin:0;overflow-x:clip}
body{background:var(--bg);color:var(--ink);font-family:var(--fd);font-size:15px;line-height:1.65;word-break:keep-all;overflow-wrap:break-word;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}svg{display:block}img{display:block;max-width:100%}
.ic{width:1em;height:1em;flex-shrink:0}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px;border:3px solid var(--bg)}
.wrap{max-width:1160px;margin:0 auto;padding:0 24px 110px}

.bar{position:sticky;top:0;z-index:50;background:rgba(8,10,14,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.bar-in{max-width:1160px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:16px}
.brand{display:flex;align-items:center;gap:10px}
.brand .mk{width:22px;height:22px;color:var(--gold);filter:drop-shadow(0 0 9px rgba(222,199,156,.4))}
.brand b{font-family:var(--fg);font-weight:600;font-size:20px;letter-spacing:.15em;color:var(--gold)}
.nav{display:flex;gap:2px;margin-left:14px}
.nav a{font-family:var(--fd);font-weight:600;font-size:14px;color:var(--dim);padding:7px 9px 9px;border-bottom:2px solid transparent;transition:.14s}
.nav a:hover{color:var(--ink)}
.nav a.on{color:var(--ink);border-bottom-color:var(--gold)}
.bar .sp{flex:1}

/* 영상 무대 */
.player{margin:22px 0 0}
.manage{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:12px 0 0;padding:10px 12px;background:var(--surface2,#161B23);border:1px solid var(--line,#1F252E);border-radius:14px}
.manage .ml{font-size:12px;font-weight:600;color:var(--gold,#DEC79C);flex:0 0 auto;letter-spacing:.02em}
.manage input{flex:1 1 200px;min-width:150px;background:var(--well,#0B0E13);border:1px solid var(--line2,#2B323C);border-radius:9px;color:var(--ink,#ECE7DD);font-size:13px;padding:9px 11px}
.manage input:focus{outline:none;border-color:var(--gold-line,rgba(222,199,156,.32))}
.manage .mbtn{flex:0 0 auto;font-size:12.5px;font-weight:600;color:var(--bg,#080A0E);background:var(--gold,#DEC79C);border:0;border-radius:9px;padding:9px 13px;cursor:pointer}
.manage .mbtn:hover{filter:brightness(1.05)}
.manage .mbtn.del{color:#DE7480;background:none;border:1px solid rgba(222,116,128,.5)}
.manage .mbtn.del:hover{background:rgba(222,116,128,.1)}
.manage .mmsg{font-size:12px;flex:0 0 auto}
.manage .mmsg.ok{color:#52C3AC}
.manage .mmsg.err{color:#DE7480}
.stage{position:relative;background:#05080b;border:1px solid var(--line);border-radius:0;overflow:hidden;aspect-ratio:16/9}
/* 각진 사각형: 둥근 모서리(18px)가 게임 화면 구석 정보(FPS·미니맵·스코어보드 모서리)를 가리는 문제 해결 */
.stage video{width:100%;height:100%;object-fit:contain;background:#05080b;display:block}
.stage.empty{display:grid;place-items:center}
.stage .novid{text-align:center;color:var(--faint);font-family:var(--fd);font-size:14px;padding:24px}
.stage .novid .mk{width:46px;height:46px;color:var(--line2);margin:0 auto 14px}
/* 시점 풀(즉시 전환) */
.stage.pool{position:relative}
.stage.pool .pvid{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#05080b;opacity:0;z-index:1;pointer-events:none;transition:opacity .1s linear}
.stage.pool .pvid.on{opacity:1;z-index:2;pointer-events:auto}
.stage.pool .poolempty{position:absolute;inset:0;display:none;place-items:center;background:#05080b;z-index:3}
.stage.pool .poolempty.on{display:grid}
.stage.pool .vspin{position:absolute;left:50%;top:50%;width:34px;height:34px;margin:-17px 0 0 -17px;border:3px solid rgba(236,231,221,.16);border-top-color:var(--gold);border-radius:50%;z-index:4;display:none;animation:vspin .8s linear infinite;pointer-events:none}
.stage.pool.loading .vspin{display:block}
@keyframes vspin{to{transform:rotate(360deg)}}
/* 분할 레이아웃 */
.stage.grid{display:grid;gap:2px;background:var(--line);aspect-ratio:auto}
.stage.grid .cell{aspect-ratio:16/9}   /* 각 셀을 16:9로 → 나란히 볼 때 레터박스 제거(스테이지 높이는 셀에 맞춰 늘어남) */
.stage.mv-2{grid-template-columns:1fr 1fr}
.stage.mv-3{grid-template-columns:1fr 1fr}
.stage.mv-3 .cell:first-child{grid-column:1/-1}
.stage.mv-4{grid-template-columns:1fr 1fr}
.stage .cell{position:relative;background:#05080b;overflow:hidden;min-height:0}
.stage .cell video{width:100%;height:100%;object-fit:contain;background:#05080b;transform:translateZ(0);image-rendering:auto;backface-visibility:hidden}
/* 각 셀 영상을 개별 GPU 레이어로 승격(translateZ) → 동시 디코딩·합성 부하 분산, 확대 시 아티팩트 감소 */
.stage .cell .tag{position:absolute;left:8px;top:8px;font-family:var(--fd);font-size:11px;font-weight:600;color:#fff;background:rgba(5,8,11,.78);padding:3px 8px;border-radius:6px;display:flex;align-items:center;gap:5px;z-index:2}
.stage .cell .tag i{width:8px;height:8px;border-radius:50%}
/* 포커스(메인+PiP) */
.piprow{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-top:8px}
.pipcell{position:relative;aspect-ratio:16/9;background:#05080b;border:1px solid var(--line);border-radius:var(--r1);overflow:hidden;cursor:pointer;transition:.14s}
.pipcell:hover{border-color:var(--gold-line)}
.pipcell video{width:100%;height:100%;object-fit:cover}
.pipcell .tag{font-size:10px;padding:2px 6px}
.pipcell .promote{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(5,8,11,.42);opacity:0;transition:.14s;color:var(--gold-ink)}
.pipcell .promote svg{width:22px;height:22px}
.pipcell:hover .promote{opacity:1}
.stage.grid .cell.zoomable{cursor:pointer}
.stage.focusmain{position:relative;cursor:pointer}
.cell .ovl,.stage.focusmain .ovl{position:absolute;top:8px;right:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:rgba(5,8,11,.6);border:1px solid var(--line2);border-radius:8px;color:#fff;opacity:0;transition:.14s;z-index:3;pointer-events:none}
.cell .ovl svg,.stage.focusmain .ovl svg{width:16px;height:16px}
.cell.zoomable:hover .ovl,.stage.focusmain:hover .ovl{opacity:.95}
/* 분할 레이아웃 토글 */
.lmode{display:inline-flex;gap:3px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r1);padding:3px}
.lmode button{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:var(--fd);font-weight:600;font-size:12.5px;color:var(--dim);background:none;border:0;border-radius:7px;padding:7px 9px;cursor:pointer;transition:.14s}
.lmode button:hover{color:var(--ink)} .lmode button.on{background:var(--gold-soft);color:var(--gold-ink)}
.lmode button svg{width:14px;height:14px}

/* POV 바 (얼굴만) */
.povbar{display:flex;align-items:center;gap:12px;margin-top:14px;flex-wrap:wrap}
.povlab{font-family:var(--fm);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink2);flex:0 0 auto}
.povtabs{display:flex;gap:11px;flex-wrap:wrap}
.povtab{position:relative;display:block;padding:0;border:0;background:none;cursor:pointer;line-height:0}
.povtab img,.povtab .ph{display:block;width:46px;height:46px;border-radius:12px;border:1px solid var(--line2);background:var(--well);object-fit:cover;opacity:.9;filter:grayscale(.08);transition:.16s}
.povtab:hover img,.povtab:hover .ph{opacity:1;border-color:var(--gold-line)}
.povtab.on img,.povtab.sel img,.povtab.on .ph,.povtab.sel .ph{opacity:1;filter:none;border-color:var(--tc);box-shadow:0 0 0 2px var(--tc),0 8px 18px -10px color-mix(in srgb,var(--tc) 55%,transparent)}
.povtab.novid{cursor:default}
.povtab .nov{position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);font-family:var(--fm);font-size:8px;font-weight:600;color:var(--dim);background:var(--well);border:1px solid var(--line);border-radius:5px;padding:1px 5px;white-space:nowrap;line-height:1.3}
.splitbtn{display:inline-flex;align-items:center;gap:8px;font-family:var(--fd);font-weight:600;font-size:13px;color:var(--ink);background:var(--surface2);border:1px solid var(--line2);padding:9px 14px;border-radius:var(--r1);cursor:pointer;transition:.14s;white-space:nowrap;margin-left:auto}
.splitbtn:hover{border-color:var(--line2);color:var(--ink)}
.splitbtn.on{color:var(--bg);background:var(--gold);border-color:var(--gold)}
.splitbtn .ic{width:15px;height:15px}
.splithint{font-family:var(--fd);font-size:12px;color:var(--dim);width:100%}
.vmode{display:inline-flex;gap:2px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r1);padding:3px;margin-left:auto}
.vmode button{flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;font-family:var(--fd);font-weight:600;font-size:12.5px;color:var(--dim);background:none;border:0;border-radius:7px;padding:7px 12px;cursor:pointer;transition:.14s;white-space:nowrap}
.vmode button:hover{color:var(--ink)}
.vmode button.on{background:var(--gold);color:var(--bg)}
.vmode button svg{width:14px;height:14px}
.vmode.vsub{margin-left:6px}
.vmode.vsub button{padding:7px 9px}
.povtab .ord{position:absolute;top:-7px;right:-7px;min-width:17px;height:17px;padding:0 3px;box-sizing:border-box;display:inline-flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:10px;font-weight:700;color:var(--bg);background:var(--tc);border-radius:9px;line-height:1;z-index:3}
@media(max-width:560px){.vmode button span{display:none}.vmode button{padding:8px 10px}}

/* 요약 바 */
.summary{margin-top:24px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);padding:18px 20px;display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.summary .verdict{font-family:var(--fs);font-weight:400;font-size:26px;letter-spacing:.01em;padding-right:22px;border-right:1px solid var(--line)}
.summary .verdict.w{color:var(--win)}.summary .verdict.l{color:var(--loss)}
.summary .si{display:flex;flex-direction:column;gap:4px}
.summary .si .k{font-family:var(--fd);font-size:11px;color:var(--dim);letter-spacing:.02em}
.summary .si .v{font-family:var(--fm);font-size:15px;color:var(--ink);font-variant-numeric:tabular-nums}
.summary .sp{flex:1}
.summary .acts{display:flex;align-items:center;gap:9px}
.actbtn{display:inline-flex;align-items:center;gap:6px;font-family:var(--fd);font-weight:600;font-size:12.5px;color:var(--ink2);background:var(--well);border:1px solid var(--line);padding:6px 11px;border-radius:var(--r1);cursor:pointer;transition:.14s;font-variant-numeric:tabular-nums}
.actbtn:hover{border-color:var(--line2);color:var(--ink)}
.actbtn.liked{color:var(--loss);border-color:var(--loss-line);background:var(--loss-soft)}
.actbtn .ic{width:15px;height:15px}
.actbtn.view{cursor:default}

h2.sec{font-family:var(--fs);font-weight:400;font-size:20px;letter-spacing:.02em;color:var(--ink);margin:34px 0 14px;display:flex;align-items:center;gap:11px}
h2.sec .ln{flex:1;height:1px;background:var(--line)}

/* 골드 그래프 */
.chartcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);padding:18px 18px 12px}
.chartcard .lg{display:flex;align-items:center;gap:18px;margin-bottom:6px;font-family:var(--fd);font-size:12.5px;color:var(--dim)}
.chartcard .lg i{display:inline-block;width:18px;height:3px;border-radius:2px;margin-right:6px;vertical-align:middle}
.chartcard svg{width:100%;height:auto;display:block;overflow:visible}
.chartcard .gx{font-family:var(--fm);font-size:10px;fill:var(--faint)}

/* 오브젝트 */
.objgrid{display:grid;grid-template-columns:1fr auto 1fr;gap:8px 16px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);padding:16px 22px}
.objgrid .ot{font-family:var(--fd);font-size:12.5px;color:var(--dim);text-align:center;letter-spacing:.02em}
.objgrid .ov{font-family:var(--fm);font-size:16px;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:7px}
.objgrid .ov.b{color:var(--blue);justify-content:flex-end}
.objgrid .ov.r{color:var(--red)}
.objgrid .ov .ic{width:15px;height:15px;opacity:.85}
.objgrid .ov b{font-weight:600}.objgrid .ov.lead b{color:var(--gold-ink)}

/* 스코어보드 */
.board{display:flex;flex-direction:column;gap:16px}
.team{background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);overflow:hidden}
.team.blue{border-top:2px solid var(--blue-line)}
.team.red{border-top:2px solid var(--red-line)}
.thead{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.thead .tn{font-family:var(--fs);font-weight:700;font-size:28px;letter-spacing:.03em;line-height:1}
.team.blue .thead .tn{color:var(--blue)}.team.red .thead .tn{color:var(--red)}
.thead .wl{font-family:var(--fm);font-size:11px;font-weight:600;letter-spacing:.06em;padding:3px 9px;border-radius:6px}
.thead .wl.w{color:var(--win);background:var(--win-soft);border:1px solid var(--win-line)}
.thead .wl.l{color:var(--loss);background:var(--loss-soft);border:1px solid var(--loss-line)}
.thead .wl.u{color:var(--dim);background:rgba(150,150,160,.1);border:1px solid var(--line2)}
.thead .tstats{font-family:var(--fm);font-size:13px;color:var(--ink2);font-variant-numeric:tabular-nums;display:flex;gap:14px}
.thead .tstats b{color:var(--ink);font-weight:600}
.thead .sp{flex:1}
.thead .bans{display:flex;align-items:center;gap:5px}
.thead .bans .bl{font-family:var(--fd);font-size:10.5px;color:var(--dim);margin-right:2px}
.thead .bans img{width:22px;height:22px;border-radius:5px;filter:grayscale(.55) brightness(.8);border:1px solid var(--line2)}

.prow{display:grid;grid-template-columns:auto auto 1fr auto auto auto auto;gap:12px;align-items:center;padding:10px 18px;border-bottom:1px solid var(--line)}
.prow:last-child{border-bottom:0}
.pchamp{position:relative;width:42px;height:42px;flex-shrink:0}
.pchamp img{width:42px;height:42px;border-radius:9px;border:1px solid var(--line2);background:var(--well)}
.pchamp .lv{position:absolute;right:-4px;bottom:-4px;font-family:var(--fm);font-size:10px;font-weight:600;color:var(--ink);background:var(--bg);border:1px solid var(--line2);border-radius:5px;padding:0 4px;min-width:17px;text-align:center}
.pspells{display:flex;flex-direction:column;gap:3px}
.pspells img{width:19px;height:19px;border-radius:5px;background:var(--well);border:1px solid var(--line)}
.pwho{min-width:0}
.pwho .pn{font-family:var(--fd);font-weight:600;font-size:13.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:7px}
.pwho .pn .mb{font-family:var(--fm);font-size:9.5px;font-weight:600;letter-spacing:.08em;color:#1a1206;background:linear-gradient(180deg,#EFDDBC,#DEC79C);padding:1px 6px;border-radius:5px}
.pwho .pp{font-family:var(--fd);font-size:11.5px;color:var(--ink2);margin-top:2px}
.pkda{text-align:center;min-width:74px}
.pkda .n{font-family:var(--fm);font-size:14px;color:var(--ink);font-variant-numeric:tabular-nums}
.pkda .n .s{color:var(--dim)}
.pkda .r{font-family:var(--fd);font-size:11px;color:var(--ink2);margin-top:2px}
.pstat{text-align:center;min-width:46px}
.pstat .n{font-family:var(--fm);font-size:13.5px;color:var(--ink);font-variant-numeric:tabular-nums}
.pstat .l{font-family:var(--fd);font-size:10.5px;color:var(--dim);margin-top:2px}
.pitems{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.pitems .it{width:26px;height:26px;border-radius:6px;background:var(--well);border:1px solid var(--line);overflow:hidden}
.pitems .it.trinket{border-color:var(--gold-line)}
.pitems .it img{width:100%;height:100%}

/* 댓글 */
.cmts{background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);padding:20px}
.cform{display:flex;gap:10px;margin-bottom:18px}
.cform input{flex:1;min-width:0;background:var(--well);border:1px solid var(--line);border-radius:var(--r1);padding:11px 14px;color:var(--ink);font-family:var(--fd);font-size:14px;outline:0}
.cform input:focus{border-color:var(--gold-line)}
.cform button{font-family:var(--fd);font-weight:600;font-size:13.5px;color:var(--bg);background:var(--gold);border:0;padding:0 18px;border-radius:var(--r1);cursor:pointer;white-space:nowrap}
@media(max-width:540px){.cform{flex-wrap:wrap}.cform #cauthor{flex:1 1 100%}.cform #cbody{flex:1 1 auto}.cform button{padding:11px 18px}}
.clist{display:flex;flex-direction:column;gap:14px}

.stage.grid.vert{grid-template-columns:1fr;grid-auto-rows:1fr;aspect-ratio:16/18;max-height:calc(100vh - 150px);margin-left:auto;margin-right:auto}
.stage.grid.vert .cell{aspect-ratio:auto;min-height:0}

.mvbar{display:flex;align-items:center;gap:11px;margin-top:8px;padding:9px 13px;background:var(--surface);border:1px solid var(--line);border-radius:11px}

  // ===== 고급 복기 엔진 (데스 패턴·15분 골드 체크포인트·딜 비중·오브젝트/템포·핵심 하나) =====
  // 프로 코칭 자료 기반: 남 탓 아닌 내 반복 실수에 집중, KDA/딜량/시야보다 골드@15·CS·오브젝트·데스 패턴을 우선.
  function _phaseOf(t){ return t<840?'early':(t<1500?'mid':'late'); }
  function deathInsights(me,pid,players,durSec){
    var kills=(ANALYSIS.kills)||[]; var myTeam=me.team;
    var my=kills.filter(function(e){return e.victim===pid;}).sort(function(a,b){return a.t-b.t;});
    var n=my.length; var out={good:[],bad:[],flow:null,deaths:n};
    if(!kills.length && me.deaths!=null) n=me.deaths;
    var tdp={}; players.forEach(function(p,i){ if(p.team===myTeam) tdp[i+1]=0; });
    kills.forEach(function(e){ if(e.victim in tdp) tdp[e.victim]++; });
    var tv=Object.keys(tdp).map(function(k){return tdp[k];});
    var tMax=tv.length?Math.max.apply(null,tv):0, tAvg=tv.length?tv.reduce(function(a,b){return a+b;},0)/tv.length:0;
    var dpm10=(durSec/60)?(my.length/(durSec/60)*10):0;
    var iLeak=kills.length&&my.length>0&&my.length===tMax&&my.length>=Math.ceil(tAvg+1.5)&&tv.length>=3&&(my.length>=6||dpm10>=3.0);
    var ph={early:0,mid:0,late:0}; my.forEach(function(e){ ph[_phaseOf(e.t)]++; });
    var clu=0; for(var i=1;i<my.length;i++){ if(my[i].t-my[i-1].t<=100) clu++; }
    var deep=0,havePos=false; my.forEach(function(e){ var p=e.pos; if(!p||p.x==null)return; havePos=true; var s=p.x+p.y; if(myTeam===100?s>16500:s<13000) deep++; });
    var role=me.position||'', isCarry=role==='BOTTOM'||role==='MIDDLE';
    if(kills.length&&n>0) out.flow='<div class="dflow"><span class="dfl">데스 흐름</span><span class="dfseg"><b>'+ph.early+'</b> 라인전(~14분)</span><span class="dfseg"><b>'+ph.mid+'</b> 중반(14~25분)</span><span class="dfseg"><b>'+ph.late+'</b> 후반(25분~)</span></div>';
    if(n<=3&&dpm10<=2) out.good.push(['죽지 않는 플레이',n+'데스로 깔끔했습니다. 데스 관리가 곧 골드·템포 관리예요 — 이 절제력이 가장 저평가된 실력입니다.']);

      else if(vspm<visFloor) bad.push(['시야 관리 부족','분당 시야 '+vspm+'점. '+rx('vision','제어 와드를 꾸준히 사 적 동선을 미리 비추세요.')]);
    }
    good=good.concat(IMI.good,FI.good,DI.good,DMI.good,MA.good);
    bad=bad.concat(FI.bad,DI.bad,IMI.bad,DMI.bad,MA.bad);
    function dedupe(a){ var s={},o=[]; a.forEach(function(x){ if(!s[x[0]]){s[x[0]]=1;o.push(x);} }); return o; }
    good=dedupe(good); bad=dedupe(bad);
    var PRI=['죽음이 오브젝트로','팀 내 최다 데스','교환 없이 죽음','선취점 헌납','라인전 단계 사망 과다','초반 동선 사망','연속으로 끊김','적 진영에서 잘림','후반 캐리 사망','데스로 새어나간 골드','초반에 벌어진 격차','라인전 크게 밀림','낮은 딜 비중','리드를 굳히지 못함','오브젝트를 내줌','시야 관리 부족','파밍 효율 저조','CS 수급 부족','낮은 킬관여'];
    bad.sort(function(a,b){ var ia=PRI.indexOf(a[0]); var ib=PRI.indexOf(b[0]); if(ia<0)ia=99; if(ib<0)ib=99; return ia-ib; });
    var focus=pickFocus(bad);
    good=good.slice(0,4); bad=bad.slice(0,5);

    function evcol(title,arr,kind){
      var head='<div class="eh"><span class="dot"></span>'+title+'</div>';
      if(!arr.length) return '<div class="evalcol '+kind+'">'+head+'<div class="crow '+(kind==='good'?'g':'b')+'"><div class="ct"><div class="a" style="color:var(--faint)">'+(kind==='good'?'두드러진 강점이 기록되지 않았습니다.':'큰 약점이 없습니다. 좋은 흐름이에요.')+'</div></div></div></div>';
      var rows=arr.map(function(x){ return '<div class="crow '+(kind==='good'?'g':'b')+'"><div class="ico">'+(kind==='good'?'✓':'!')+'</div><div class="ct"><div class="t">'+esc(x[0])+'</div><div class="a">'+esc(x[1])+'</div></div></div>'; }).join('');
      return '<div class="evalcol '+kind+'">'+head+'<div class="ceval">'+rows+'</div></div>';
    }
    function p3(val,lo,hi){ return val==null?null:(val>=hi?2:(val<lo?0:1)); }
    var gp=[];
    if(!isSup) gp.push([isJg?1:(pos==='BOTTOM'?3:2),p3(me.cs_per_min,csFloor,csGood)]);
    if(isLane && lane.cs10!=null) gp.push([1,p3(lane.cs10,-10,10)]);
    if(me.kda!=null) gp.push([pos==='BOTTOM'?3:2,p3(me.kda,2,3)]);
    if(me.kp!=null) gp.push([(isJg||isSup)?3:(pos==='TOP'?1:2),p3(me.kp,kpB-0.1,kpB+0.1)]);
    if(vspm!=null) gp.push([isSup?3:(isJg?2:1),p3(vspm,visFloor,visGood)]);
    var gws=0,gss=0; gp.forEach(function(x){ if(x[1]!=null){ gws+=x[0]*2; gss+=x[0]*x[1]; } });
    var gradeHTML='';
    if(gws>0){
      var gscore=Math.round(gss/gws*100);
      var gl=gscore>=85?'S':(gscore>=70?'A':(gscore>=55?'B':(gscore>=40?'C':'D')));
      gradeHTML='<div class="grade g-'+gl.toLowerCase()+'"><div class="gv">'+gl+'</div><div class="gx"><div class="gs">'+gscore+'<span class="gsl"> / 100</span></div><div class="gd">측정 지표 종합 등급입니다. 의사결정·시야·웨이브 관리는 아래 항목으로 직접 확인하세요.</div></div></div>';
    }
    var focusHTML = focus ? '<div class="cfocus"><div class="cfl">이번 게임, 딱 하나만 고친다면</div><div class="cft"><b>'+esc(focus[0])+'</b> · '+esc(focus[1])+'</div></div>' : '';
    var checksHTML='',drillHTML='';
    if(guide){
      checksHTML='<div class="checks"><div class="chead">영상으로 직접 확인할 것 · '+guide.ko+'</div>';
      guide.checks.forEach(function(q){ checksHTML+='<div class="crq"><span class="qm">?</span><span>'+esc(q)+'</span></div>'; });
      checksHTML+='</div>';
      if(bad.length){
        drillHTML='<div class="drills"><div class="dhead">이번 주 훈련 과제</div>';
        guide.drills.slice(0,2).forEach(function(d){ drillHTML+='<div class="drow"><span class="dn">▸</span><span>'+esc(d)+'</span></div>'; });
        drillHTML+='</div>';
      }
    }
    return '<div class="coachhead"><span class="t">복기 분석</span><span class="s">'+(P.posKo(pos)||'내 플레이')+' 기준</span><span class="ln"></span></div>'
      +(ANALYSIS.source==='live'?'<div class="srcnote">Live 분석 — KDA·CS·시야·오브젝트는 정확하지만, 딜량·골드 추이는 기록되지 않습니다.</div>':'')
      +gradeHTML+focusHTML
      +(DI.flow||'')
      +(sg?'<div class="subgrid">'+sg+'</div>':'')
      +'<div class="evalcols">'+evcol('잘한 점',good,'good')+evcol('개선할 점',bad,'bad')+'</div>'
      +checksHTML+drillHTML;
  }

  // 킬/데스/오브젝트 버튼 → 영상 점프. 게임시각 t를 각 영상의 (t - g0)로 변환해 seek.
  // 보이는 영상 전부(나란히=모든 셀 / 단일=활성 영상)를 맞춘다. 메타데이터 미로드면 로드 후 seek,
  // 일부 브라우저·원격 영상이 먼 지점 seek 직후 0으로 되돌아가는 현상은 재확인 루프로 복구.
  function _seekVid(v, vt){
    if(!v || v._err) return 0;
    vt = Math.max(0, vt||0);
    var apply=function(){
      try{ var d=v.duration; if(isFinite(d)&&d>0.6) vt=Math.min(vt, d-0.3); v.currentTime=vt; }catch(_){}
    };
    if(v.readyState>=1 && isFinite(v.duration)) apply();
    else { try{v.load();}catch(_){}  v.addEventListener('loadedmetadata', apply, {once:true}); }
    return vt;
  }
  function jumpTo(gameT){
    var vids = split ? stageVideos() : (activeVideo()?[activeVideo()]:stageVideos());
    vids = vids.filter(function(v){ return v && !v._err; });
    if(!vids.length){ var fb=document.querySelector('#stagehost video'); if(fb) vids=[fb]; }
    if(!vids.length) return;
    var goals = vids.map(function(v){ return { v:v, t:_seekVid(v, gameT - vG0(v)) }; });
    vids.forEach(function(v){ var p=v.play&&v.play(); if(p&&p.catch)p.catch(function(){}); });
    var n=0; (function fix(){ n++;
      goals.forEach(function(g){ try{ if(g.t>1 && (g.v.currentTime||0) < g.t-1.5) g.v.currentTime=g.t; }catch(_){} });
      if(n<8) setTimeout(fix, 220);
    })();
    var ref=vids[0], y=ref.getBoundingClientRect().top+window.pageYOffset-64;
    window.scrollTo({top:y<0?0:y, behavior:'smooth'});
  }
  document.addEventListener('click', function(e){
    var b=e.target.closest?e.target.closest('.jbtn[data-jump]'):null;
    if(!b) return;
    jumpTo(parseInt(b.getAttribute('data-jump'),10)||0);
  });

  // 좌우 화살표로 영상 이동(±5초). 단일=활성 영상 / 멀티=마스터(나머지는 동기화로 따라옴).
  function seekRel(d){
    var v=activeVideo(); if(!v||v._err) return;
    var nt=(v.currentTime||0)+d; if(nt<0) nt=0;
    try{ var du=v.duration; if(isFinite(du)&&du>0.6) nt=Math.min(nt,du-0.1); v.currentTime=nt; }catch(_){}
  }
  document.addEventListener('keydown', function(e){
    if(e.metaKey||e.ctrlKey||e.altKey) return;
    var t=(e.target&&e.target.tagName||'').toLowerCase();
    if(t==='input'||t==='textarea'||t==='select'||(e.target&&e.target.isContentEditable)) return;
    if(e.key==='ArrowLeft' || e.key==='ArrowRight'){
      if(!activeVideo()) return;
      e.preventDefault();
      seekRel(e.key==='ArrowLeft' ? -5 : 5);
    }
  });


  function kills(o,k){ var v=(o||{})[k]; return (v&&typeof v==='object')?(v.kills||0):(v||0); }


  // ── 경기 요약 (LCK식 팀 비교) ──
  function teamSum(team){
    var ps=(ANALYSIS.players||[]).filter(function(p){return p.team===team;});
    return { k:ps.reduce(function(s,p){return s+(p.kills||0);},0),
             d:ps.reduce(function(s,p){return s+(p.deaths||0);},0),
             a:ps.reduce(function(s,p){return s+(p.assists||0);},0),
             gold:ps.reduce(function(s,p){return s+(p.gold||0);},0), n:ps.length };
  }
  function objN(team,key){ var o=(ANALYSIS.objectives||{})[team]||(ANALYSIS.objectives||{})[String(team)]||{}; return kills(o,key); }
  function lckHeader(){
    var b=teamSum(100), r=teamSum(200);
    var won100=(ANALYSIS.win_team==null)?null:(ANALYSIS.win_team===100);
    var time=P.mmss(ANALYSIS.duration || (ROWS[curPov]&&ROWS[curPov].length_sec) || 0);
    function side(team,won){
      var wl=won===true?'WIN':won===false?'LOSS':'';
      var nm=(team===100?'BLUE':'RED'), sc=(team===100?b.k:r.k);
      var row1=(team===100)
        ? '<span class="lhteam">'+nm+'</span><span class="lhsc">'+sc+'</span>'
        : '<span class="lhsc">'+sc+'</span><span class="lhteam">'+nm+'</span>';
      return '<div class="lhside '+(team===100?'blue':'red')+(won===true?' won':'')+'">'
        +'<div class="lhrow1">'+row1+'</div>'
        +(wl?'<div class="lhwl '+(won===true?'win':'loss')+'">'+wl+'</div>':'')+'</div>';
    }
    return '<div class="lckhead">'
      +side(100,won100)
      +'<div class="lhtime"><div class="lhtv">'+time+'</div><div class="lhtl">GAME TIME</div></div>'
      +side(200,(won100===null?null:!won100))+'</div>';
  }

  function gameStats(){
    var b=teamSum(100), r=teamSum(200);
    // 모든 오브젝트 = 실제 Riot 아이콘(assets/obj/, 고해상 통일). 드래곤은 원소별로 다른 아이콘.
    var DFILE={FIRE:'infernal',WATER:'ocean',EARTH:'mountain',AIR:'cloud',HEXTECH:'hextech',CHEMTECH:'chemtech',ELDER:'elder'};
    function img(file){ var f=(file.indexOf('.')>=0?file:file+'.png'); return '<img class="dico" src="assets/obj/'+f+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">'; }
    function num(n){ return n>0?String(n):'<span class="z">—</span>'; }
    function kda(k,d,a){ return '<span class="kdav">'+k+'<i>/</i>'+d+'<i>/</i>'+a+'</span>'; }
    function oico(n,file){ if(!n) return '<span class="z">—</span>'; var k=Math.min(n,6),s='<span class="ov">'; for(var i=0;i<k;i++)s+=img(file); s+='</span>'; return n>6?(s+'<span class="ovn">'+n+'</span>'):s; }
    function banVal(team){ var bs=((ANALYSIS.bans||{})[team])||((ANALYSIS.bans||{})[String(team)])||[]; if(!bs.length) return '<span class="z">—</span>'; return '<span class="bv">'+bs.slice(0,5).map(function(cid){ return '<img src="'+P.champIcon(ver,champNameById(cid))+'" alt="" loading="lazy" onerror="this.style.visibility=\'hidden\'">'; }).join('')+'</span>'; }
    function row(label,bval,rval,bv,rv){ var lc=bv>rv?'bl':(rv>bv?'rl':''); return '<div class="srow '+lc+'"><div class="sb">'+bval+'</div><div class="sl">'+label+'</div><div class="sr">'+rval+'</div></div>'; }
    function elderN(team){ return (ANALYSIS.objs||[]).filter(function(e){ return (e.kind||'').toUpperCase()==='DRAGON' && (e.sub||'').toUpperCase()==='ELDER_DRAGON' && e.team===team; }).length; }
    // 처치한 원소 드래곤 목록(타임라인 기반, 장로 제외)
    function drakes(team){ return (ANALYSIS.objs||[]).filter(function(e){ return (e.kind||'').toUpperCase()==='DRAGON' && (e.sub||'').toUpperCase()!=='ELDER_DRAGON' && e.team===team; }).map(function(e){ return (e.sub||'').toUpperCase().replace('_DRAGON',''); }); }
    function drakeCount(team){ var d=drakes(team); return d.length || Math.max(0, objN(team,'dragon')-elderN(team)); }
    function drakeVal(team){
      var d=drakes(team);
      if(d.length){ var s='<span class="ov dr">'; d.slice(0,6).forEach(function(el){ s+=img(DFILE[el]||'infernal'); }); s+='</span>'; return d.length>6?(s+'<span class="ovn">'+d.length+'</span>'):s; }
      var n=Math.max(0, objN(team,'dragon')-elderN(team)); // objs 없는 옛 게임: 개수만
      if(!n) return '<span class="z">—</span>';
      return '<span class="ovnum">'+n+'</span>';
    }
    function elderVal(team){ var n=elderN(team); if(!n) return '<span class="z">—</span>'; var s='<span class="ov dr">'; for(var i=0;i<n;i++)s+=img('elder'); s+='</span>'; return s; }
    var hasBans=(((ANALYSIS.bans||{})[100]||(ANALYSIS.bans||{})['100']||[]).length || ((ANALYSIS.bans||{})[200]||(ANALYSIS.bans||{})['200']||[]).length);
    function visionN(team){ return (ANALYSIS.players||[]).filter(function(p){return p.team===team;}).reduce(function(s,p){return s+Math.round(p.vision||0);},0); }
    var hasVis=(ANALYSIS.players||[]).some(function(p){return (p.vision||0)>0;});
    return ''
      + row('KDA', kda(b.k,b.d,b.a), kda(r.k,r.d,r.a), b.k, r.k)
      + row('GOLD', P.compact(b.gold), P.compact(r.gold), b.gold, r.gold)
      + row('TOWERS', num(objN(100,'tower')), num(objN(200,'tower')), objN(100,'tower'), objN(200,'tower'))
      + row('VOID GRUBS', oico(objN(100,'horde'),'grub.svg'), oico(objN(200,'horde'),'grub.svg'), objN(100,'horde'), objN(200,'horde'))
      + row('HERALDS', oico(objN(100,'riftHerald'),'herald'), oico(objN(200,'riftHerald'),'herald'), objN(100,'riftHerald'), objN(200,'riftHerald'))
      + row('DRAKES', drakeVal(100), drakeVal(200), drakeCount(100), drakeCount(200))
      + row('ELDERS', elderVal(100), elderVal(200), elderN(100), elderN(200))
      + row('BARONS', oico(objN(100,'baron'),'baron'), oico(objN(200,'baron'),'baron'), objN(100,'baron'), objN(200,'baron'))
      + (hasVis ? row('VISION', String(visionN(100)), String(visionN(200)), visionN(100), visionN(200)) : '')
      + (hasBans ? row('BANS', banVal(100), banVal(200), 0, 0) : '');
  }

  function lckDash(){
    var dmg = damageHas()

    var _gds = _acc ? ANALYSIS.series : (goldDiffSeries() || ANALYSIS.series || null);
    var gold = (_gds && _gds.length>1) ? ('<div class="lckpanel"><div class="lcktt">GOLD DIFFERENCE'+(_acc?'':' · 추정')+'</div>'+goldDiffChart(_gds)+'</div>') : '';

  // ── 가한 피해량 ──
  function damageHas(){ return (ANALYSIS.players||[]).some(function(p){return (p.dmg||0)>0;}); }
  function damageBars(){
    var ps=(ANALYSIS.players||[]); var maxD=1; ps.forEach(function(p){ maxD=Math.max(maxD,p.dmg||0); });
    var saver=(ROWS[curPov]||{}).saver;
    var hasPre=ps.some(function(p){ return typeof p.dmg14==='number'; });
    var RFILE={TOP:'top',JUNGLE:'jungle',MIDDLE:'middle',BOTTOM:'bottom',UTILITY:'support'};
    function rico(pos){ var f=RFILE[(pos||'').toUpperCase()]; return f?'<img class="rico" src="assets/lane/'+f+'.png" alt="" loading="lazy" onerror="this.style.display=\'none\'">':'<span class="rico"></span>'; }
    function col(team){
      var list=ps.filter(function(p){return p.team===team;}).sort(function(a,b){return P.posRank(a.position)-P.posRank(b.position);});
      return '<div class="dcol '+(team===100?'blue':'red')+'">'+list.map(function(p){
        var d=p.dmg||0, w=Math.round(d/maxD*100), me=saver&&p.name===saver;
        var pre=(typeof p.dmg14==='number' && d>0) ? Math.min(100,Math.round(p.dmg14/d*100)) : -1;
        return '<div class="drow'+(me?' me':'')+'">'
          +'<img class="dchamp" src="'+P.champIcon(ver,p.champion)+'" alt="" loading="lazy" onerror="this.style.visibility=\'hidden\'">'
          +'<div class="dnv"><span class="dn">'+esc(p.name||'')+'</span><span class="dv">'+P.compact(d)+'</span></div>'
          +'<div class="dtrack"><div class="dfill '+(team===100?'b':'r')+'" style="width:'+w+'%">'
          +(pre>=0?'<span class="dpre" style="width:'+pre+'%"></span>':'')
          +'</div></div></div>';
      }).join('')+'</div>';
    }
    return '<div class="dmg">'+col(100)+col(200)+'</div>'
      + (hasPre ? '<div class="dleg"><span class="dls"></span>DAMAGE DEALT pre 14</div>' : '');
  }

  // ── CS 바 (Live 게임 등 딜량 데이터가 없을 때 오른쪽 패널을 LCK식으로 채움) ──
  function csHas(){ return (ANALYSIS.players||[]).some(function(p){return (p.cs||0)>0;}); }
  function csBars(){
    var ps=(ANALYSIS.players||[]); var maxC=1; ps.forEach(function(p){ maxC=Math.max(maxC,p.cs||0); });
    var saver=(ROWS[curPov]||{}).saver;
    var RFILE={TOP:'top',JUNGLE:'jungle',MIDDLE:'middle',BOTTOM:'bottom',UTILITY:'support'};
    function rico(pos){ var f=RFILE[(pos||'').toUpperCase()]; return f?'<img class="rico" src="assets/lane/'+f+'.png" alt="" loading="lazy" onerror="this.style.display=\'none\'">':'<span class="rico"></span>'; }
    function col(team){
      var list=ps.filter(function(p){return p.team===team;}).sort(function(a,b){return P.posRank(a.position)-P.posRank(b.position);});
      return '<div class="dcol '+(team===100?'blue':'red')+'">'+list.map(function(p){
        var c=p.cs||0, w=Math.round(c/maxC*100), me=saver&&p.name===saver;

          +'<img class="dchamp" src="'+P.champIcon(ver,p.champion)+'" alt="" loading="lazy" onerror="this.style.visibility=\'hidden\'">'
          +'<div class="dnv"><span class="dn">'+esc(p.name||'')+'</span><span class="dv">'+c+'</span></div>'
          +'<div class="dtrack"><div class="dfill '+(team===100?'b':'r')+'" style="width:'+w+'%"></div></div></div>';
      }).join('')+'</div>';

  // ── 골드 차이 그래프 (곡선 + 글로우 + 그리드 + 마커/주석) ──
  function smoothPath(pts){
    if(pts.length<2) return '';
    if(pts.length===2) return 'M'+pts[0].x.toFixed(1)+' '+pts[0].y.toFixed(1)+' L'+pts[1].x.toFixed(1)+' '+pts[1].y.toFixed(1);
    var d='M'+pts[0].x.toFixed(1)+' '+pts[0].y.toFixed(1);
    for(var i=0;i<pts.length-1;i++){
      var p0=pts[i-1]||pts[i], p1=pts[i], p2=pts[i+1], p3=pts[i+2]||pts[i+1];
      var c1x=p1.x+(p2.x-p0.x)/6, c1y=p1.y+(p2.y-p0.y)/6;
      var c2x=p2.x-(p3.x-p1.x)/6, c2y=p2.y-(p3.y-p1.y)/6;
      d+=' C'+c1x.toFixed(1)+' '+c1y.toFixed(1)+' '+c2x.toFixed(1)+' '+c2y.toFixed(1)+' '+p2.x.toFixed(1)+' '+p2.y.toFixed(1);
    }
    return d;
  }
  // 골드 차이(추정): 저장된 킬·어시·오브젝트 타임스탬프로 다시 계산. 보유 아이템 가치보다 실제 우위를 잘 반영(킬골드를 안 쓰고 들고 다니는 스노볼 팀 보정).
  function goldDiffSeries(){
    var byT=function(a,b){return a.t-b.t;};
    var players=ANALYSIS.players||[];
    function teamOf(pid){ var pp=players[pid-1]; return pp?pp.team:null; }
    function objGold(kind,sub){ var k=(kind||'').toUpperCase(), su=(sub||'').toUpperCase();
      if(k==='BARON_NASHOR'||k==='BARON') return 1400;
      if(k==='DRAGON') return su==='ELDER_DRAGON'?260:110;
      if(k==='RIFTHERALD'||k==='HERALD') return 150;
      if(k==='TOWER') return 250;
      if(k==='BUILDING'||k==='INHIBITOR') return 160;
      if(k==='ATAKHAN') return 200;
      return 0; }
    var evs=[];
    (ANALYSIS.kills||[]).forEach(function(e){
      if(!e || typeof e.t!=='number') return;
      var kt=teamOf(e.killer); if(kt===100||kt===200) evs.push({t:e.t, team:kt, g:300});
      (e.assists||[]).forEach(function(a){ var at=teamOf(a); if(at===100||at===200) evs.push({t:e.t, team:at, g:150}); });
    });
    (ANALYSIS.objs||[]).forEach(function(o){
      if(!o || typeof o.t!=='number') return;
      var g=objGold(o.kind,o.sub); if(g && (o.team===100||o.team===200)) evs.push({t:o.t, team:o.team, g:g});
    });
    if(!evs.length) return null;
    evs.sort(byT);
    var g100=0,g200=0, out=[{t:0,g100:0,g200:0}];
    evs.forEach(function(e){ if(e.team===100) g100+=e.g; else g200+=e.g; out.push({t:e.t,g100:g100,g200:g200}); });
    var dur=ANALYSIS.duration||0; if(dur>out[out.length-1].t) out.push({t:dur,g100:g100,g200:g200});
    return out.length>1?out:null;
  }

  function goldDiffChart(series){
    if(!series || series.length<2) return '';
    var W=1000, H=250, pad=12, padB=34, padT=14;
    var maxT=series[series.length-1].t||1;
    var diffs=series.map(function(s){ return (s.g100||0)-(s.g200||0); });
    var maxUp=0, maxDn=0, exi=0, exv=0;
    diffs.forEach(function(d,i){ if(d>0) maxUp=Math.max(maxUp,d); else maxDn=Math.max(maxDn,-d); if(Math.abs(d)>Math.abs(exv)){ exv=d; exi=i; } });
    if(maxUp===0 && maxDn===0){ maxUp=maxDn=1; }
    var span=(maxUp+maxDn)||1, yBase=padT+(maxUp/span)*(H-padT-padB);
    function x(t){ return pad+(t/maxT)*(W-2*pad); }
    function y(d){ if(d>=0) return yBase-(maxUp?d/maxUp:0)*(yBase-padT); return yBase+(maxDn?(-d)/maxDn:0)*((H-padB)-yBase); }
    var pts=series.map(function(s,i){ return {x:x(s.t), y:y(diffs[i])}; });
    var line=smoothPath(pts);
    var area=line+' L'+x(maxT).toFixed(1)+' '+yBase.toFixed(1)+' L'+x(0).toFixed(1)+' '+yBase.toFixed(1)+' Z';
    var bf=(yBase/H*100).toFixed(2);
    var step=maxT>1800?600:300, grid='', ticks='';
    for(var t=step;t<maxT;t+=step){ grid+='<line x1="'+x(t).toFixed(1)+'" y1="'+padT+'" x2="'+x(t).toFixed(1)+'" y2="'+(H-padB)+'" stroke="var(--line)" stroke-width="1" stroke-dasharray="2 5"/>'; }
    for(var t2=0;t2<=maxT;t2+=step){ ticks+='<text class="gx" x="'+x(t2).toFixed(1)+'" y="'+(H-padB+14)+'" text-anchor="middle">'+Math.round(t2/60)+'분</text>'; }
    var yl='';
    if(maxUp>1) yl+='<text class="gyl" x="'+(pad+3)+'" y="'+(padT+9)+'" fill="var(--blue)">+'+P.compact(maxUp)+'</text>';
    if(maxDn>1) yl+='<text class="gyl" x="'+(pad+3)+'" y="'+(H-padB-4)+'" fill="var(--red)">-'+P.compact(maxDn)+'</text>';
    var marks='';
    (ANALYSIS.objs||[]).forEach(function(e){
      var tt=e.t||0; if(tt>maxT) return;
      var ic=e.kind==='baron'?'B':e.kind==='dragon'?'D':e.kind==='riftHerald'?'H':''; if(!ic){ var k=(e.kind||'').toUpperCase(),s=(e.sub||'').toUpperCase(); ic=(k==='BARON_NASHOR'||k==='BARON')?'B':k==='DRAGON'?(s==='ELDER_DRAGON'?'E':'D'):(k==='RIFTHERALD'||k==='HERALD')?'H':k==='ATAKHAN'?'A':''; } if(!ic) return;
      var cx=x(tt).toFixed(1), cy=(H-13), col=e.team===100?'var(--blue)':e.team===200?'var(--red)':'var(--line2)';
      marks+='<circle cx="'+cx+'" cy="'+cy+'" r="8" fill="var(--well)" stroke="'+col+'" stroke-width="1.4"/><text x="'+cx+'" y="'+(cy+3)+'" text-anchor="middle" class="gm">'+ic+'</text>';
    });
    var anx=x(series[exi].t).toFixed(1), any=y(exv).toFixed(1), anc=exv>=0?'var(--blue)':'var(--red)';
    var ann='<circle cx="'+anx+'" cy="'+any+'" r="4.5" fill="'+anc+'" stroke="var(--bg)" stroke-width="1.5"/>';
    var maxLead=Math.max(maxUp,maxDn);
    return '<div class="gdc">'
      +'<div class="lg"><span><i style="background:var(--blue)"></i>BLUE LEAD</span><span><i style="background:var(--red)"></i>RED LEAD</span><span style="margin-left:auto;color:var(--faint)">MAX '+P.compact(maxLead)+'</span></div>'
      +'<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">'
      +'<defs>'
        +'<linearGradient id="gdfill" x1="0" y1="0" x2="0" y2="1">'
          +'<stop offset="0%" stop-color="var(--blue)" stop-opacity="0.45"/>'
          +'<stop offset="'+bf+'%" stop-color="var(--blue)" stop-opacity="0.04"/>'
          +'<stop offset="'+bf+'%" stop-color="var(--red)" stop-opacity="0.04"/>'
          +'<stop offset="100%" stop-color="var(--red)" stop-opacity="0.45"/>'
        +'</linearGradient>'
        +'<linearGradient id="gdline" x1="0" y1="0" x2="0" y2="1">'
          +'<stop offset="0%" stop-color="#7cc4f5"/><stop offset="'+bf+'%" stop-color="var(--blue)"/>'
          +'<stop offset="'+bf+'%" stop-color="var(--red)"/><stop offset="100%" stop-color="#f08a72"/>'
        +'</linearGradient>'
        +'<filter id="gdglow" x="-20%" y="-40%" width="140%" height="180%"><feGaussianBlur stdDeviation="1.7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>'
      +'</defs>'
      +grid
      +'<path d="'+area+'" fill="url(#gdfill)" stroke="none"/>'
      +'<line x1="'+pad+'" y1="'+yBase.toFixed(1)+'" x2="'+(W-pad)+'" y2="'+yBase.toFixed(1)+'" stroke="var(--line2)" stroke-width="1" stroke-dasharray="4 4"/>'
      +'<path class="gdline" d="'+line+'" fill="none" stroke="url(#gdline)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" filter="url(#gdglow)"/>'
      +ann+yl+ticks+marks

  }

  function liveSet(){
    var withVid = ROWS.map(function(r,i){ return r.video?i:-1; }).filter(function(i){ return i>=0; });

  function mvBar(){

    var VOL='<svg viewBox="0 0 24 24"><path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor"/></svg>';

    _addM('timeupdate', paintTime);

  function stageVideos(){ var h=document.getElementById('stagehost'); return h?Array.prototype.slice.call(h.querySelectorAll('video')):[]; }

  function rowG0(i){ var r=ROWS[i]; var g=r&&r.analysis&&r.analysis.g0; return (typeof g==='number'&&isFinite(g))?g:0; }

  // 페이지 열자마자 자동재생: 소리로 시도 → 브라우저가 막으면 음소거로 재생(음소거 자동재생은 항상 허용). 사용자는 볼륨 버튼으로 소리 켬.

  // 모든 분할 영상을 병렬로 목표 시각으로 시크 + 잠깐 드리프트 루프 정지 → '멈칫하고 이동' 방지
  function seekAllTo(masterTime, lockMs){
    var vids=stageVideos(), master=vids[0]; if(!master) return;
    var gm=vG0(master), base=masterTime<0?0:masterTime;
    _seekLock=performance.now()+(lockMs||1400);

      var want=(v===master)?base:base+(gm-vG0(v)); if(want<0)want=0;

  // ── 재생 속도 + 프레임 스텝 + 클립 공유(?t= 딥링크) ──
  var RATE=1, RATES=[0.5,1,1.25,1.5,2], _toastT=null;

  function frameStep(dir){
    var FR=1/30;

  function parseT(s){

    var n=parseFloat(s); return (isFinite(n)&&n>0)?n:0;

  function fmtClock(s){ s=Math.max(0,Math.floor(s||0)); var m=Math.floor(s/60), ss=s%60; return m+':'+(ss<10?'0':'')+ss; }
  function clipUrl(){
    var v=activeVideo(); var t=Math.max(0, Math.floor((v&&v.currentTime)||0));

    if(tn==='input'||tn==='textarea'||tg.isContentEditable) return;
    if(e.key===','||e.key==='<'){ if(e.shiftKey) cycleRate(-1); else frameStep(-1); e.preventDefault(); }

  // ── 전체화면(멀티뷰) 컨트롤 바 자동 숨김: 무동작 ~2.8s 후 바+커서 숨김, 움직이면 복귀 ──
  (function(){
    var idleT=null;
    function fsEl(){ return document.fullscreenElement||document.webkitFullscreenElement||null; }
    function inFs(){ var h=document.getElementById('stagehost'); return !!(h && fsEl()===h); }
    function wake(ms){
      var h=document.getElementById('stagehost'); if(!h) return;
      h.classList.remove('idle');
      if(idleT){ clearTimeout(idleT); idleT=null; }
      if(inFs()) idleT=setTimeout(function(){ var hh=document.getElementById('stagehost'); if(hh && inFs()) hh.classList.add('idle'); }, ms||1600);
    }
    function onFs(){
      var h=document.getElementById('stagehost'); if(!h) return;
      if(inFs()){ h.classList.add('fs'); wake(1000); }
      else { h.classList.remove('fs'); h.classList.remove('idle'); if(idleT){ clearTimeout(idleT); idleT=null; } }
    }
    document.addEventListener('fullscreenchange', onFs);
    document.addEventListener('webkitfullscreenchange', onFs);
    document.addEventListener('mousemove', function(){ if(inFs()) wake(); });
    document.addEventListener('keydown', function(){ if(inFs()) wake(); });
    document.addEventListener('pointerdown', function(e){
      if(!inFs()) return;
      var h=document.getElementById('stagehost');
      if(h && h.classList.contains('idle')){ wake(); e.stopPropagation(); e.preventDefault(); }
      else wake();
    }, true);
  })();

  function renderStage(){
    var host = document.getElementById('stagehost');
    if(!host) return;
    if(syncRAF){ cancelAnimationFrame(syncRAF); syncRAF=null; }
    POOL = null;
    var multi = split && selected.length>=2;
    // ★ 분할 재렌더: 재생 중인 video element를 버리지 않고 보존했다가 새 레이아웃에 옮겨 끼움 → 끊김 없음.
    var wasPlaying=false, salv={};
    // 현재 스테이지의 모든 영상을 POV 인덱스로 캡처(단일↔멀티 양방향 보존) — 리스너 정리 후 DOM에서 분리(재생 상태 유지)
    stageVideos().forEach(function(v){
      var _ix=v.getAttribute('data-idx'); if(_ix===null) _ix=v.getAttribute('data-pv');
      var ix=(_ix===null?NaN:+_ix);
      if(ix>=0){
        if(!v.paused) wasPlaying=true;
        if(v._splitH && v._splitH.length) unwireSplitVid(v);
        if(v._poolH && v._poolH.length) unwirePoolVid(v);
        if(v.parentNode) v.parentNode.removeChild(v);
        salv[ix]=v;
      }
    });
    host.innerHTML = multi ? ((splitMode==='focus'?stageFocus():stageSplit()) + mvBar()) : stageSingle();
    host.insertAdjacentHTML('beforeend', '<button class="clipshare" id="clipshare" aria-label="클립 공유" title="현재 장면부터 재생되는 링크 복사"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.5.5l3-3a5 5 0 0 0-7-7l-1.7 1.7"/><path d="M14 11a5 5 0 0 0-7.5-.5l-3 3a5 5 0 0 0 7 7l1.7-1.7"/></svg><span>클립 공유</span></button>');
    // 새 자리표시(단일 data-pv / 멀티 data-idx)에 보존본 이식: fresh의 식별 속성을 보존본에 복사 → 그대로 재사용(콜드마운트 없음)
    host.querySelectorAll('video[data-pv], video[data-idx]').forEach(function(fresh){
      var _ix=fresh.getAttribute('data-idx'); if(_ix===null) _ix=fresh.getAttribute('data-pv');
      var ix=+_ix, keep=salv[ix];
      if(keep && keep!==fresh && fresh.parentNode){
        ['data-pv','data-idx','class','controls'].forEach(function(a){ var val=fresh.getAttribute(a); if(val===null) keep.removeAttribute(a); else keep.setAttribute(a,val); });
        // 멀티 마스터(selected[0])는 듣던 소리 유지 — 셀 템플릿의 muted 를 강제복사하면 전환 순간 무음이 됨
        if(!(multi && ix===selected[0])){ try{ keep.muted=fresh.muted; }catch(_){} }
        fresh.parentNode.replaceChild(keep, fresh);
        salv[ix]=null;
      }
    });
    Object.keys(salv).forEach(function(k){ if(salv[k]){ try{ salv[k].pause(); }catch(_){} } });   // 사용 안 된 보존본 정지
    if(multi){
      VSALV={}; host.querySelectorAll('video[data-idx]').forEach(function(v){ VSALV[+v.getAttribute('data-idx')]=v; });
      wireMaster();
      wireMvBar();
      host.querySelectorAll('.pipcell[data-promote]').forEach(function(c){
        c.addEventListener('click', function(){
          var idx=+c.dataset.promote, pos=selected.indexOf(idx);
          if(pos>0){ markResume(); selected.splice(pos,1); selected.unshift(idx); renderPovBar(); renderStage(); }
        });
      });
      // 멀티: 격자 셀을 누르면 그 시점을 크게(포커스), 포커스의 큰 화면을 누르면 다시 격자로
      if(splitMode==='grid'){
        host.querySelectorAll('.stage.grid .cell').forEach(function(c){
          c.addEventListener('click', function(){
            var v=c.querySelector('video'); if(!v) return;
            var idx=+v.dataset.idx, pos=selected.indexOf(idx);
            markResume();
            if(pos>0){ selected.splice(pos,1); selected.unshift(idx); }
            splitMode='focus'; renderPovBar(); renderStage();
          });
        });
      } else {
        var _fm=host.querySelector('.stage.focusmain');
        if(_fm) _fm.addEventListener('click', function(){ markResume(); splitMode='grid'; renderPovBar(); renderStage(); });
      }
      if(wasPlaying){ playLive(); }   // 재생 중이었으면 계속 재생(새로 추가된 시점도 동기 재생)
    } else {
      wirePool();
    }
    // 레이아웃 전환: 보던 시점(시간)을 그대로 이어가기. 새 마스터가 로드 전이면 메타데이터 로드 후 seek→재생으로 묶어
    // '0초부터 재생됐다가 튀는' 현상을 막는다(= 처음으로 리셋되는 것처럼 보이던 버그).
    var _m=activeVideo();
    var _rt=resumeAt, _wantPlay=resumePlay; resumeAt=0; resumePlay=false;
    var _kick=function(){
      if(!_wantPlay) return;
      if(split){ playLive(); }
      else if(_m){ var _pp=_m.play&&_m.play(); if(_pp&&_pp.catch)_pp.catch(function(){}); }
    };
    var _resume=function(){
      if(split){ if(_rt>0) seekAllTo(_rt, 1600); } else if(_rt>0 && _m){ try{ _m.currentTime=_rt; }catch(_){} }
      _kick();
      setTimeout(_kick, 140);   // 모바일: video 재부모화 시 자동 pause 가 play 뒤에 적용되는 브라우저가 있어 한 번 더
    };
    if(_m && _rt>0 && _m.readyState<1){ _m.addEventListener('loadedmetadata', _resume, {once:true}); }
    else { _resume(); }
    applyRate(RATE);
    startSync();
  }

  function wirePool(){
    POOL = document.getElementById('vpool'); if(!POOL) return;
    POOL.querySelectorAll('.pvid').forEach(function(v){
      var i=+v.getAttribute('data-pv');
      v._poolH = v._poolH || [];
      var _addP=function(ev,fn){ v.addEventListener(ev,fn); v._poolH.push({ev:ev,fn:fn}); };
      _addP('error', function(){ v._err=true; if(i===curPov){ var ov=POOL.querySelector('.poolempty'); if(ov)ov.classList.add('on'); POOL.classList.remove('loading'); } });
      _addP('waiting', function(){ if(i===curPov) POOL.classList.add('loading'); });
      _addP('seeking', function(){ if(i===curPov) POOL.classList.add('loading'); });
      ['playing','seeked','canplay','timeupdate'].forEach(function(ev){ _addP(ev, function(){ if(i===curPov) POOL.classList.remove('loading'); }); });
      _addP('play',  function(){ if(i===curPov) playLive(); });
      _addP('pause', function(){ if(i===curPov) pauseLive(); });
    });
  }
  function wireMaster(){
    var master = stageVideos()[0]; if(!master) return;
    master._splitH = master._splitH || [];
    var _addW=function(ev,fn){ master.addEventListener(ev,fn); master._splitH.push({ev:ev,fn:fn}); };
    _addW('play',  function(){ playLive(); });
    _addW('pause', function(){ pauseLive(); });
    _addW('seeked',function(){ var base=master.currentTime, gm=vG0(master); stageVideos().forEach(function(v){ if(v!==master){ var want=base+(gm-vG0(v)); if(want<0)want=0; try{ if(Math.abs((v.currentTime||0)-want)>0.25) v.currentTime=want; }catch(_){} } }); });
  }

  function setActive(i){
    if(split) return;
    if(!POOL){ curPov=i; renderStage(); return; }
    var old=POOL.querySelector('.pvid.on');
    var oldT=old?(old.currentTime||0):(resumeAt||0), oldG=old?vG0(old):0, playing=old?!old.paused:false;
    var target=POOL.querySelector('.pvid[data-pv="'+i+'"]');
    if(!target){
      if(ROWS[i] && ROWS[i].video){ var rt=oldT+(oldG-rowG0(i)); resumeAt=rt<0?0:rt; curPov=i; renderStage(); return; }   // 워밍 안 된 시점 → 풀 재구성해 포함
      curPov=i;
      if(old){ try{old.pause();}catch(_){} old.classList.remove('on'); old.removeAttribute('controls'); old.muted=true; }
      var ov=POOL.querySelector('.poolempty'); if(ov) ov.classList.add('on');
      return;
    }
    curPov=i;
    var ov2=POOL.querySelector('.poolempty'); if(ov2) ov2.classList.remove('on');
    if(target===old){ target.setAttribute('controls',''); target.muted=false; return; }
    var want=oldT+(oldG-vG0(target)); if(want<0) want=0;
    var needSeek=false;
    try{ if(Math.abs((target.currentTime||0)-want)>0.25){ target.currentTime=want; needSeek=true; } }catch(_){}
    if(playing){ var pp=target.play(); if(pp&&pp.catch)pp.catch(function(){}); }   // 목표를 음소거 상태로 돌려 프레임을 미리 디코드
    // ★ 깜빡임 제거: 목표 프레임이 실제로 준비된 다음에 화면 전환(크로스페이드). 그 전까진 이전 화면 유지(소리도 이전 것만 → 더블 오디오 없음).
    var _tok=(++_swapTok), _done=false;
    var _swap=function(){
      if(_done || _tok!==_swapTok) return; _done=true;
      if(old&&old!==target){ old.classList.remove('on'); old.removeAttribute('controls'); old.muted=true; }
      target.classList.add('on'); target.setAttribute('controls',''); target.muted=false;
      POOL.classList.remove('loading');
    };
    if(needSeek || target.readyState<2){          // 새 위치로 점프했거나 아직 버퍼 전 → 준비되면 전환(그동안 이전 화면+스피너 유지)
      POOL.classList.add('loading');
      ['seeked','canplay','loadeddata'].forEach(function(ev){ target.addEventListener(ev, _swap, {once:true}); });
      if(target.requestVideoFrameCallback){ try{ target.requestVideoFrameCallback(function(){ _swap(); }); }catch(_){} }
      setTimeout(_swap, 1200);                     // 폴백: 너무 오래 걸리면 전환(스피너가 버퍼링 표시)
    } else {                                       // 이미 올바른 프레임이 디코드돼 있음(동기 재생 중) → 다음 프레시 프레임에 맞춰 즉시 전환
      if(target.requestVideoFrameCallback){ try{ target.requestVideoFrameCallback(function(){ _swap(); }); }catch(_){} setTimeout(_swap, 100); }
      else { _swap(); }
    }
  }

  function startSync(){
    if(syncRAF){ cancelAnimationFrame(syncRAF); syncRAF=null; }
    function loop(){
      if(performance.now() < _seekLock){ syncRAF=requestAnimationFrame(loop); return; }   // 시크 정착 중엔 교정 생략
      var a=activeVideo();
      if(a){
        var base=a.currentTime||0, ga=vG0(a);
        stageVideos().forEach(function(v){
          if(v!==a && !v._err && !v.paused){
            var want=base+(ga-vG0(v)); if(want<0) want=0;
            if(Math.abs((v.currentTime||0)-want)>0.28){ try{v.currentTime=want;}catch(_){} }
          }
        });
      }
      syncRAF=requestAnimationFrame(loop);
    }
    syncRAF=requestAnimationFrame(loop);
  }

  function bindPov(){
    var host = document.getElementById('povhost');
    if(!host) return;
    host.addEventListener('click', function(e){
      // 보기 모드 세그먼트(단일/나란히/포커스) — 항상 보이고, 한 번 클릭으로 그 모드로
      var orb = e.target.closest('[data-or]');
      if(orb){ markResume(); orientUserSet=true; gridVert=(orb.dataset.or==='v'); renderPovBar(); renderStage(); return; }
      var seg = e.target.closest('[data-vm]');
      if(seg){
        var vm = seg.dataset.vm;
        markResume();
        if(vm==='single'){
          if(split){ if(selected.length) curPov = selected[0]; split=false; selected=[]; orientUserSet=false; }
        } else {   // 멀티 → 격자 보기. 처음 진입이면 영상 2개 자동 선택
          if(!split){
            split=true;
            if(selected.length<2){
              selected=[];
              if(ROWS[curPov] && ROWS[curPov].video) selected.push(curPov);
              for(var k=0;k<ROWS.length && selected.length<2;k++){ if(selected.indexOf(k)<0 && ROWS[k] && ROWS[k].video) selected.push(k); }
              orientUserSet=false;
            }
          }
          splitMode='grid';
          if(!orientUserSet) gridVert = (selected.length===2);   // 2명=위아래 기본 / 3·4명=그리드
        }
        renderPovBar(); renderStage(); return;
      }
      // 얼굴 클릭
      var tab = e.target.closest('.povtab'); if(!tab) return;
      var i = +tab.dataset.idx;
      if(split){
        if(!ROWS[i] || !ROWS[i].video) return;            // 비교 모드: 영상 없는 시점은 선택 불가
        markResume();
        var pos = selected.indexOf(i);
        if(pos>=0){ if(selected.length>2) selected.splice(pos,1); }   // 다시 누르면 제외(최소 2명)
        else if(selected.length<4){ selected.push(i); }              // 추가(최대 4명)
        if(!orientUserSet) gridVert = (selected.length===2);          // 2명=위아래 / 3·4명=그리드(사용자가 직접 고르기 전까지)
        renderPovBar(); renderStage();
      } else {
        setActive(i); renderPovBar(); renderAnalysis();
      }
    });
  }

  function verdictLine(me, won){
    var lane=me.lane||{}, pos=me.position||'';
    var isLane=pos!=='JUNGLE'&&pos!=='UTILITY';
    var key;
    if(isLane && lane.cs10!=null && lane.cs10>=15) key='라인전을 강하게 지배한';
    else if(isLane && lane.cs10!=null && lane.cs10>=10) key='라인전 우위를 잡은';
    else if(isLane && lane.cs10!=null && lane.cs10<=-10) key='라인전이 밀린';
    else if(me.deaths!=null && me.deaths>=8) key='교전에서 자주 끊긴';
    else if(me.kda!=null && me.kda>=4) key='안정적으로 풀어간';
    else if(me.kp!=null && me.kp>=0.6) key='팀 교전을 주도한';
    else key='무난하게 흘러간';
    var tail = won===true?' 경기입니다. 강점을 유지해 보세요.':(won===false?' 경기입니다. 아래 개선점을 짚어 보세요.':' 경기입니다.');
    return key+tail;
  }

  function heroStats(me){
    var c = '';
    c += '<span class="chip"><b>'+(me.cs||0)+'</b>CS</span>';
    if (me.gold)  c += '<span class="chip"><b>'+P.compact(me.gold)+'</b>\uace8\ub4dc</span>';
    if (me.dmg)   c += '<span class="chip"><b>'+P.compact(me.dmg)+'</b>\ub529\ub7c9</span>';
    if (me.vision!=null) c += '<span class="chip"><b>'+Math.round(me.vision)+'</b>\uc2dc\uc57c</span>';
    if (me.cs_per_min)   c += '<span class="chip ghost"><b>'+me.cs_per_min+'</b>CS/\ubd84</span>';
    return '<div class="hstats">'+c+'</div>';
  }

  function heroBlock(rep, won){
    var saver=(ROWS[curPov]||{}).saver;
    var players=ANALYSIS.players||[];
    var me=null, i;
    for(i=0;i<players.length;i++){ if(players[i].name===saver){ me=players[i]; break; } }
    var verdict = won===true?'승리':(won===false?'패배':'결과');
    var wl = won===true?'w':(won===false?'l':'u');
    var len = rep.length || P.mmss(ANALYSIS.duration);
    var queue = P.queueName(rep.type||ANALYSIS.queue);
    var date = P.ago(rep.uploaded)||'-';
    var meta = '<div class="hmeta">'+queue+'<i>\u00b7</i>'+len+'<i>\u00b7</i>'+date+'</div>';
    var badge = (won===true||won===false) ? ('<div class="wlbadge '+wl+'">'+verdict+'</div>') : '';
    var side = '<div class="hside">'+badge+'<div class="hfoot">'+meta+likeBtnHTML()+viewHTML()+'</div></div>';
    if(!me){
      return '<div class="hero '+wl+'"><div class="hchamp"><div class="ci"></div><div><div class="nm">경기 기록</div></div></div>'
        +'<div class="hmid"><div class="vsum">분석 정보가 없는 경기입니다. 영상으로 다시 볼 수 있습니다.</div></div>'+side+'</div>';
    }
    var champ=me.champion||'', pos=P.posKo(me.position)||'';
    var kda=P.kdaRatio(me.kills,me.deaths,me.assists);
    return '<div class="hero '+wl+'">'
      +'<div class="hchamp"><div class="ci"><img src="'+P.champIcon(ver,champ)+'" alt="'+esc(champ)+'" onerror="this.style.visibility=\'hidden\'"><span class="lv">'+(me.level||'')+'</span></div>'
        +'<div><div class="nm">'+esc(champ)+'</div>'+(pos?'<div class="po">'+pos+'</div>':'')+'</div></div>'
      +'<div class="hmid"><div class="hkda"><div class="v">'+(me.kills||0)+'<span class="s">/</span>'+(me.deaths||0)+'<span class="s">/</span>'+(me.assists||0)+'</div><div class="r">KDA '+kda+'</div></div>'
        +'<div class="vsum">'+verdictLine(me,won)+'</div>'
        + heroStats(me) + '</div>'
      +side+'</div>';
  }

  // 하이라이트: 이미 업로드된 이벤트(킬·오브젝트)만으로 가장 극적인 장면을 골라낸다(서버/재분석 불필요 → 기존 영상에도 적용).
  // 한타(킬 밀집)·바론/장로 교전·내 멀티킬·선취점을 점수화해 상위 몇 개만. (죽음 위기 구출 등은 체력 데이터가 없어 제외)
  function computeHighlights(myPid){
    var K=(ANALYSIS.kills||[]).filter(function(e){return e&&typeof e.t==='number'&&(e.killer||e.victim);}).slice().sort(function(a,b){return a.t-b.t;});
    var O=(ANALYSIS.objs||[]).filter(function(e){return e&&typeof e.t==='number';});
    var dur=ANALYSIS.duration||0;
    if(!K.length && !O.length) return [];
    function objIn(t0,t1,kind,sub){ for(var i=0;i<O.length;i++){var o=O[i]; if(o.t>=t0&&o.t<=t1&&o.kind===kind&&(sub==null||(o.sub||'')===sub)) return o;} return null; }
    var GAP=12, clusters=[], cur=null;
    K.forEach(function(k){
      if(cur && k.t-cur.end<=GAP){ cur.kills.push(k); cur.end=k.t; }
      else { cur={start:k.t,end:k.t,kills:[k]}; clusters.push(cur); }
    });
    var cand=[];
    clusters.forEach(function(c){
      var n=c.kills.length; if(n<2) return;   // 1킬은 한타가 아님(킬 줄에 이미 있음)
      var myK=0, mine=false;
      c.kills.forEach(function(k){ if(myPid>0){ if(k.killer===myPid){myK++;mine=true;} if(k.victim===myPid)mine=true; if((k.assists||[]).indexOf(myPid)>=0)mine=true; } });
      var baron=objIn(c.start-16,c.end+16,'BARON_NASHOR',null);
      var elder=objIn(c.start-16,c.end+16,'DRAGON','ELDER_DRAGON');
      var dragon=objIn(c.start-16,c.end+16,'DRAGON',null);
      var score=n, label;
      if(baron){ score+=5; label='바론 한타'; }
      else if(elder){ score+=4; label='장로 한타'; }
      else if(n>=4){ score+=2; label='대규모 한타 '+n+'킬'; }
      else if(dragon){ score+=1.5; label='용 교전 '+n+'킬'; }
      else label='한타 '+n+'킬';
      if(myK>=2){ label=({2:'더블킬',3:'트리플킬',4:'쿼드라킬',5:'펜타킬'}[Math.min(5,myK)])+(baron?' · 바론':(elder?' · 장로':'')); score+=myK*2.5; }
      if(mine) score+=2;
      if(dur && c.end>=dur-80) score+=3;   // 후반 결정적 교전 가중
      cand.push({disp:c.start, lead:5, label:label, score:score});
    });
    function inFight(t){ return clusters.some(function(c){ return c.kills.length>=2 && t>=c.start-13 && t<=c.end+13; }); }
    O.forEach(function(o){
      if(o.kind==='BARON_NASHOR' && !inFight(o.t)) cand.push({disp:o.t, lead:8, label:'바론 획득', score:5});
      else if(o.kind==='DRAGON' && (o.sub||'')==='ELDER_DRAGON' && !inFight(o.t)) cand.push({disp:o.t, lead:8, label:'장로 드래곤', score:4});
    });
    if(K.length && K[0].t<=480) cand.push({disp:K[0].t, lead:4, label:'선취점', score:2.5});
    cand.sort(function(a,b){return b.score-a.score;});
    var picked=[];
    cand.forEach(function(h){ if(picked.length<5 && !picked.some(function(p){return Math.abs(p.disp-h.disp)<8;})) picked.push(h); });
    picked.sort(function(a,b){return a.disp-b.disp;});
    return picked.map(function(h){ return {t:Math.max(0,h.disp-h.lead), disp:h.disp, label:h.label}; });
  }

  function jumpsBlock(){
    var saver=(ROWS[curPov]||{}).saver;
    var players=ANALYSIS.players||[];
    var meIdx=-1, i;
    for(i=0;i<players.length;i++){ if(players[i].name===saver){ meIdx=i; break; } }
    var pid = meIdx>=0 ? meIdx+1 : -1;
    // 하이라이트(게임 전체 · 내가 낀 장면은 가중)
    var hls=computeHighlights(pid), hlHTML='';
    if(hls.length){
      var spark='<svg class="hi" viewBox="0 0 24 24" fill="currentColor"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>';
      var hb=hls.map(function(h){ return '<button class="jbtn hl" data-jump="'+Math.round(h.t)+'">'+spark+'<span class="hl-l">'+h.label+'</span><span class="hl-t">'+fmtT(h.disp)+'</span></button>'; }).join('');
      hlHTML='<div class="kdrow hl"><span class="kdtag hc"><span class="cdot"></span>하이라이트</span><div class="kdstrip">'+hb+'</div></div>';
    }
    // 내 킬·데스
    var kdHTML='';
    if(pid>0){
      var allK=(ANALYSIS.kills||[]);
      var myKills=allK.filter(function(e){ return e.killer===pid; }).sort(function(a,b){return a.t-b.t;});
      var myDeaths=allK.filter(function(e){ return e.victim===pid; }).sort(function(a,b){return a.t-b.t;});
      var row=function(arr,kind,labelko,tagcls){
        if(!arr.length) return '';
        var btns=arr.map(function(e){ return '<button class="jbtn '+kind+'" data-jump="'+Math.max(0,e.t-4)+'">'+fmtT(e.t)+'</button>'; }).join('');
        return '<div class="kdrow '+kind+'"><span class="kdtag '+tagcls+'"><span class="cdot"></span>'+labelko+'</span><div class="kdstrip">'+btns+'</div></div>';
      };
      if(myKills.length||myDeaths.length){
        kdHTML=row(myKills,'kill','킬','kc')+row(myDeaths,'death','데스','dc');
      }
    }
    if(!hlHTML && !kdHTML) return '';
    return '<div class="vjumps">'+hlHTML+kdHTML+'</div>';
  }

  // ── 내 영상 관리(소유자만: 제목 수정 / 삭제) ──
  function myRow(){ if(!ME||!ME.puuid) return null; return ROWS.filter(function(r){ return r.owner_puuid===ME.puuid; })[0]||null; }
  function renderAuthChip(){
    var host=document.getElementById('auth'); if(!host) return;
    if(ME && ME.puuid){
      host.innerHTML='<a class="me-link" href="me.html">나의 협곡</a><span class="who"></span><button class="lo" id="loBtn">로그아웃</button>';
      var nm=(ME.name||'').split('#')[0]||'소환사';
      var w=host.querySelector('.who'); w.textContent=nm; w.title=ME.name||'';
      var b=document.getElementById('loBtn');
      if(b) b.addEventListener('click', async function(){ try{ await P.logout(); }catch(e){} location.href='index.html'; });
    } else { host.innerHTML='<span class="hint" style="display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--dim,#867F71);white-space:nowrap" title="myPENTA 레코더의 Archive 버튼을 누르면 이 브라우저가 로그인됩니다"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>레코더로 로그인</span>'; }
  }

  function renderManage(){
    var host=document.getElementById('managehost'); if(!host) return;
    var r=myRow();
    if(!r){ host.innerHTML=''; return; }
    host.innerHTML='<div class="manage"><span class="ml">내 영상</span>'
      + '<input id="mtitle" maxlength="80" placeholder="제목(선택) — 예: 바론 앞 한타 4킬">'
      + '<button id="msave" class="mbtn">저장</button>'
      + '<button id="mdel" class="mbtn del">삭제</button>'
      + '<span class="mmsg" id="mmsg"></span></div>';
    var ti=document.getElementById('mtitle'), msg=document.getElementById('mmsg');
    ti.value=r.title||'';
    document.getElementById('msave').addEventListener('click', async function(){
      this.disabled=true;
      try{ await P.updateMatchMeta(MID, ti.value.trim()); r.title=ti.value.trim(); msg.textContent='저장됨'; msg.className='mmsg ok'; }
      catch(e){ msg.textContent='저장 실패'; msg.className='mmsg err'; }
      this.disabled=false;
    });
    document.getElementById('mdel').addEventListener('click', async function(){
      if(!confirm('이 게임에 올린 내 영상을 삭제할까요? 되돌릴 수 없습니다.')) return;
      this.disabled=true;
      try{ await P.deleteMatch(MID); location.href='index.html'; }
      catch(e){ msg.textContent='삭제 실패'; msg.className='mmsg err'; this.disabled=false; }
    });
  }

  function renderAll(){
    var rep = ROWS[curPov] || P.pickPrimary(ROWS) || {};
    var won = ANALYSIS.win_team!=null ? (saverWon(rep)) : null;
    var len = rep.length || P.mmss(ANALYSIS.duration);
    var patch = (ANALYSIS.patch||'').split('.').slice(0,2).join('.');
    var verdict = won===true?'승리':won===false?'패배':'결과';

    main.innerHTML =
      '<div id="herohost">'+heroBlock(rep, won)+'</div>'
      + '<h2 class="sec">다시 보기<span class="ln"></span></h2>'
      + '<div class="player"><div id="stagehost"></div><div class="povbar" id="povhost"></div></div>'
      + '<div id="managehost"></div>'
      + '<div id="anahost">'+jumpsBlock()+coachCard(rep)+'</div>'
      + '<h2 class="sec">경기 분석<span class="ln"></span></h2>'+lckDash()
      + '<h2 class="sec">스코어보드<span class="ln"></span></h2><div class="sb2">'+teamBlock(100)+teamBlock(200)+'</div>'
      + '<h2 class="sec">댓글<span class="ln"></span></h2>'
      + '<div class="cmts"><div class="cform"><input id="cauthor" placeholder="이름(선택)" maxlength="24"><input id="cbody" placeholder="댓글을 입력하세요" maxlength="300"><button id="cpost">등록</button></div><div class="clist" id="clist"></div></div>';

    renderStage(); renderPovBar(); bindPov(); runCounts(); renderManage(); animateChart();
    document.getElementById('likebtn').addEventListener('click', function(){ toggleLike(this); });
    document.getElementById('cpost').addEventListener('click', postComment);
    document.getElementById('cbody').addEventListener('keydown', function(e){ if(e.key==='Enter') postComment(); });
    loadComments();
  }

  function renderAnalysis(){
    var rep = ROWS[curPov] || P.pickPrimary(ROWS) || {};
    var won = (ANALYSIS && ANALYSIS.win_team!=null) ? saverWon(rep) : null;
    var hh = document.getElementById('herohost'); if(hh) hh.innerHTML = heroBlock(rep, won);
    var ah = document.getElementById('anahost'); if(ah) ah.innerHTML = jumpsBlock() + coachCard(rep);
    var lb = document.getElementById('likebtn'); if(lb){ if(liked) lb.classList.add('liked'); lb.addEventListener('click', function(){ toggleLike(this); }); }
    runCounts();
  }

  var _countObs = null;
  function countUp(el){
    var txt = (el.textContent||'').trim();
    var m = txt.match(/^([^\d]*)([\d][\d,]*(?:\.\d+)?)(.*)$/);
    if(!m) return;
    var pre=m[1], numS=m[2], suf=m[3], hasC=numS.indexOf(',')>=0, dec=(numS.split('.')[1]||'').length, target=parseFloat(numS.replace(/,/g,''));
    if(!isFinite(target)) return;
    function fmt(v){ var s; if(hasC){ s=Number(dec?v.toFixed(dec):Math.round(v)).toLocaleString(undefined,{minimumFractionDigits:dec,maximumFractionDigits:dec}); } else { s=dec?v.toFixed(dec):String(Math.round(v)); } return pre+s+suf; }
    var st=null;
    function step(ts){ if(st==null) st=ts; var p=Math.min(1,(ts-st)/850), e=1-Math.pow(1-p,3); if(p<1){ el.textContent=fmt(target*e); requestAnimationFrame(step); } else { el.textContent=pre+numS+suf; } }
    el.textContent=fmt(0); requestAnimationFrame(step);
  }
  function runCounts(){
    if(typeof IntersectionObserver==='undefined') return;
    if(_countObs) _countObs.disconnect();
    _countObs = new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){ countUp(e.target); _countObs.unobserve(e.target); } }); }, {threshold:.4});
    var els = document.querySelectorAll('#anahost .substat .v'); for(var i=0;i<els.length;i++) _countObs.observe(els[i]);
  }

  // 골드 차이 라인: 한 번 그려지는 연출
  function animateChart(){
    try{
      var p=main.querySelector('.gdc .gdline'); if(!p || !p.getTotalLength) return;
      var L=p.getTotalLength(); if(!L) return;
      p.style.strokeDasharray=L; p.style.strokeDashoffset=L;
      requestAnimationFrame(function(){ requestAnimationFrame(function(){ p.style.strokeDashoffset=0; }); });
    }catch(e){}
  }

  function saverWon(rep){
    if(rep && rep.won!=null) return rep.won;
    var c=P.saverCard(rep);
    if(c && c.win!=null) return !!c.win;                    // 플레이어 승패가 있으면 그대로
    var wt=(ANALYSIS.win_team!=null)?ANALYSIS.win_team:(rep&&rep.winner);   // 없으면 win_team+내팀으로 판정
    if(wt!=null && c && c.team!=null) return c.team===wt;
    return null;                                            // 진짜 알 수 없을 때만 미확인
  }

  async function load(){
    MID = qs('id') || '';
    if(!MID){ main.innerHTML='<div class="state"><h3>매치를 찾을 수 없습니다</h3><p><a href="index.html">목록으로 돌아가기</a></p></div>'; return; }
    try{ ver = await P.ddVersion(); }catch(e){}
    try{ await P.ddChampMap(ver); }catch(e){}
    var rows;
    try{ rows = await P.sbSelect('matches','select=*&match_id=eq.'+encodeURIComponent(MID)+'&order=uploaded.desc'); }
    catch(e){ main.innerHTML='<div class="state"><h3>불러오지 못했습니다</h3><p>잠시 후 다시 시도해 주세요.</p></div>'; return; }
    if(!rows || !rows.length){
      main.innerHTML='<div class="state"><svg class="mk" viewBox="0 0 24 24"><path d="M12 2 L15 9 L22 9 L16.5 13.5 L18.5 21 L12 16.5 L5.5 21 L7.5 13.5 L2 9 L9 9 Z" fill="currentColor"/></svg><h3>매치를 찾을 수 없습니다</h3><p>삭제되었거나 아직 업로드되지 않았을 수 있습니다. <a href="index.html">목록으로</a></p></div>';
      return;
    }
    ROWS = rows;
    try{ ME = await P.initAuth(); }catch(e){ ME = null; }
    renderAuthChip();
    try{ STAT = await P.statsOne(MID); }catch(e){ STAT = {likes:0, views:0}; }
    // 분석은 영상 있는 대표 우선, 없으면 첫 행
    var rep = P.pickPrimary(ROWS) || ROWS[0];
    ANALYSIS = rep.analysis || {};
    // 각 행에 _team(녹화자 팀) 부착(분할 태그 색)
    ROWS.forEach(function(r){ var c=P.saverCard(r); r._team = c?c.team:100; });
    // 시작 시점: URL ?pov={rowId} 있으면 그 시점부터, 없으면 대표
    var _pov = qs('pov');
    var _pi = _pov ? ROWS.findIndex(function(x){ return String(x.id)===String(_pov); }) : -1;
    curPov = _pi>=0 ? _pi : Math.max(0, ROWS.indexOf(rep));
    renderAll();
    autoplayNow();
    var _t0 = parseT(qs('t'));   // ?t=90 또는 ?t=1:30 → 그 장면부터
    if(_t0>0){
      var _sv=activeVideo();
      if(_sv){
        var _ap=function(){ try{ if(split) seekAllTo(_t0, 1400); else _sv.currentTime=_t0; }catch(_){} };
        if(_sv.readyState>=1) _ap(); else _sv.addEventListener('loadedmetadata', _ap, {once:true});
      }
    }
    bumpView();
  }

  load();
})();
</script>
