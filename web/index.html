<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
 --bg:#0C0D10;--surface:#131519;--surface2:#181B21;--hover:#1D2128;--well:#0E0F13;
 --ink:#ECEEF2;--ink2:#C5C9D0;--dim:#9AA0AA;--faint:#7A8496;
 --line:#1F232B;--line2:#2C313B;
 --acc:#5E6878;--acc-ink:#D7DFEA;--acc-soft:rgba(199,210,225,.10);--acc-line:rgba(199,210,225,.32);
 --win:#D7DFEA;--loss:#E8694C;--gold:#E0B441;--blue:#5BA3E0;--violet:#C07BE0;
 --h-battle:#F0703C;--h-tech:#3A56CC;--h-expand:#C07BE0;
 --r-ran:#5BA3E0;--r-zerg:#C07BE0;--r-toss:#E0B441;
 --fd:'Pretendard Variable','Pretendard','Apple SD Gothic Neo',system-ui,sans-serif;
 --fh:'Pretendard Variable','Pretendard',system-ui,sans-serif;
 --fm:'IBM Plex Mono',ui-monospace,monospace;
 --r1:10px;--r2:14px;--r3:18px;--sh:0 16px 40px -20px rgba(0,0,0,.72);
}
*{box-sizing:border-box}html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:var(--fd);font-size:15px;line-height:1.55;word-break:keep-all;overflow-wrap:break-word;-webkit-font-smoothing:antialiased;letter-spacing:.005em}
a{color:inherit;text-decoration:none}svg{display:block}
.ic{width:1em;height:1em;flex-shrink:0}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px;border:3px solid var(--bg)}
.wrap{max-width:1180px;margin:0 auto;padding:0 28px 120px}

.bar{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--line)}.bar.scrolled{box-shadow:0 6px 22px rgba(0,0,0,.4)}
.bar.scrolled{border-color:var(--line)}
.bar-in{max-width:1180px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;gap:18px}
.brand{display:flex;align-items:center;gap:10px}
.brand .gem{width:19px;height:19px;border-radius:6px;background:linear-gradient(140deg,#D7DFEA,#8B95A6);box-shadow:0 0 0 1px rgba(255,255,255,.06) inset,0 4px 12px -3px rgba(199,210,225,.5);position:relative}
.brand .gem::after{content:"";position:absolute;inset:4px;border-radius:3px;background:linear-gradient(140deg,rgba(255,255,255,.25),transparent)}
.brand .lgmk{width:20px;height:20px;color:var(--ink)}
.brand b{font-family:var(--fh);font-weight:800;font-size:17px;letter-spacing:.2em}
.nav{display:flex;gap:2px;margin-left:16px}
.nav a{font-family:var(--fd);font-weight:600;font-size:14px;color:var(--dim);padding:8px 14px;border-radius:var(--r1);transition:.15s}
.nav a.on{color:var(--ink);background:var(--surface)}.nav a:hover{color:var(--ink)}
.bar .sp{flex:1}
.search{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r1);padding:9px 14px;width:248px;transition:.15s}
.search:focus-within{border-color:var(--acc-line);box-shadow:0 0 0 3px var(--acc-soft)}
.search .ic{width:15px;height:15px;color:var(--faint)}
.search input{background:none;border:0;outline:0;color:var(--ink);font-family:var(--fd);font-size:14px;width:100%}
.search input::placeholder{color:var(--faint)}
.live{display:inline-flex;align-items:center;gap:7px;white-space:nowrap;font-family:var(--fd);font-weight:500;font-size:12px;color:var(--ink2);background:var(--surface);border:1px solid var(--line);padding:8px 14px;border-radius:100px}
.live .d{position:relative;width:7px;height:7px;border-radius:50%;background:var(--acc-ink);box-shadow:0 0 7px rgba(214,224,238,.55)}
.live .d::after{content:"";position:absolute;inset:-4px;border-radius:50%;border:1.5px solid var(--acc);animation:livePulse 2.2s ease-out infinite}
@keyframes livePulse{0%{transform:scale(.5);opacity:.75}70%{opacity:0}100%{transform:scale(1.9);opacity:0}}

.head{padding:16px 0 18px}
.head .eb{font-family:var(--fm);font-size:11px;letter-spacing:.24em;color:var(--acc-ink);text-transform:uppercase;margin-bottom:16px}
.head h1{font-family:var(--fh);font-weight:800;font-size:clamp(21px,2.4vw,27px);margin:0;letter-spacing:-.02em;color:#F7F4EE;line-height:1.12}
.head .desc{font-family:var(--fd);font-size:14.5px;line-height:1.6;color:var(--dim);margin:9px 0 0;max-width:700px}
.head .desc b{color:var(--ink);font-weight:600}
/* 홈 히어로(#9) */
.hero2{position:relative;overflow:hidden;border:1px solid var(--line2);border-radius:var(--r3);background:radial-gradient(rgba(255,255,255,.02) 1px,transparent 1.4px) 0 0/22px 22px,radial-gradient(130% 150% at 90% -30%,rgba(199,210,225,.22),transparent 56%),linear-gradient(180deg,var(--surface2),var(--surface));padding:40px 42px;margin:8px 0 24px;display:grid;grid-template-columns:1.55fr .85fr;gap:26px;align-items:center}
.hero2::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--acc-ink),var(--acc));z-index:1}
.hero2-l{min-width:0}
.h2eb{font-family:var(--fm);font-size:11.5px;letter-spacing:.22em;color:var(--acc-ink);text-transform:uppercase;margin-bottom:15px}
.hero2 h1{font-family:var(--fh);font-weight:800;font-size:clamp(28px,4vw,44px);line-height:1.08;letter-spacing:-.022em;margin:0 0 16px;color:#F7F4EE}
.hero2 p{font-size:16px;line-height:1.72;color:var(--ink2);margin:0 0 24px;max-width:48ch}
.h2cta{display:flex;gap:12px;flex-wrap:wrap}
.h2cta a{display:inline-flex;align-items:center;gap:8px;font-family:var(--fd);font-weight:700;font-size:14.5px;padding:12px 22px;border-radius:100px;transition:.15s;cursor:pointer}
.h2cta a svg{width:16px;height:16px}
.h2cta .primary{background:var(--acc);color:#fff;border:1px solid var(--acc);box-shadow:0 6px 20px -6px rgba(199,210,225,.6)}
.h2cta .primary:hover{filter:brightness(1.07);transform:translateY(-1px)}
.h2cta .ghost{background:transparent;color:var(--ink2);border:1px solid var(--line2)}
.h2cta .ghost:hover{border-color:var(--acc-line);color:var(--ink)}
.hero2-viz{display:flex;align-items:center;justify-content:center}
.hero2-viz svg{width:100%;max-width:250px;height:auto;filter:drop-shadow(0 8px 30px rgba(199,210,225,.35))}
/* 명경기 배지(#7) */
.hotb{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.01em;color:#E8C568;background:rgba(224,180,65,.11);border:1px solid rgba(224,180,65,.30);border-radius:6px;padding:2px 8px;display:inline-flex;align-items:center;gap:4px}
@media(max-width:760px){.hero2{grid-template-columns:1fr;padding:28px 22px;margin-bottom:18px}.hero2-viz{display:none}.hero2 p{font-size:15px}}

.toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:24px;padding:15px 20px;background:linear-gradient(180deg,var(--surface2),var(--surface));border:1px solid var(--line);border-radius:var(--r2)}
.stats{display:flex;gap:0}
.stat{padding:0 20px;border-left:1px solid var(--line)}
.stat:first-child{padding-left:0;border-left:0}
.stat 
.stat .v.acc{color:var(--acc-ink)}.stat .v small{font-size:12px;color:var(--dim);font-weight:600;margin-left:1px}
.stat .k{font-family:var(--fh);font-weight:600;font-size:11px;letter-spacing:.01em;color:var(--dim);margin-top:7px}
.tools{display:flex;align-items:center;gap:9px}
.ctrl{display:inline-flex;align-items:center;gap:9px;font-family:var(--fd);font-weight:600;font-size:13.5px;color:var(--ink2);background:var(--well);border:1px solid var(--line2);padding:10px 14px;border-radius:var(--r1);cursor:pointer;transition:.15s}
.ctrl:hover{border-color:var(--line2);color:var(--ink);background:var(--hover)}
.ctrl .lbl{color:var(--faint);font-weight:500}
.ctrl .ic{width:15px;height:15px;color:var(--dim)}
.ctrl .cv{width:14px;height:14px;color:var(--faint)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(286px,1fr));gap:22px;margin-top:4px}

.feat{grid-column:1/-1;display:grid;grid-template-columns:1.6fr 1fr;background:var(--surface);border:1px solid var(--line);border-radius:var(--r3);overflow:hidden;margin-bottom:4px;cursor:pointer;transition:.17s;position:relative}
.feat::before{content:'';position:absolute;left:0;right:0;top:0;height:2px;background:linear-gradient(90deg,var(--acc),transparent 55%);z-index:4;pointer-events:none}
.feat:hover{border-color:var(--line2)}
.feat .ft{position:relative;aspect-ratio:16/9;background:radial-gradient(120% 100% at 50% 0,#151921,#0a0b0e)}
.feat .ft .wm{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--fh);font-weight:800;font-size:34px;color:rgba(241,238,231,.07);text-align:center;padding:0 24px;letter-spacing:-.01em}
.feat .ft .play{position:absolute;left:26px;bottom:26px;width:56px;height:56px;border-radius:50%;display:grid;place-items:center;background:rgba(199,210,225,.13);border:1px solid var(--acc-line);transition:.2s}
.feat:hover .ft .play{background:rgba(199,210,225,.22);transform:scale(1.05)}
.feat .ft .play .ic{width:22px;height:22px;color:var(--acc-ink);margin-left:3px}
.dur{position:absolute;right:14px;bottom:14px;display:inline-flex;align-items:center;gap:6px;font-family:var(--fd);font-size:11.5px;color:var(--ink);background:rgba(6,6,4,.76);padding:5px 9px;border-radius:6px;backdrop-filter:blur(4px);font-variant-numeric:tabular-nums}
.dur .ic{width:12px;height:12px;color:var(--dim)}
.bm{position:absolute;right:12px;top:12px;width:32px;height:32px;border-radius:50%;display:grid;place-items:center;background:rgba(6,6,4,.6);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(4px);transition:.15s;z-index:3}
.bm .ic{width:15px;height:15px;color:var(--ink2)}
.bm:hover{background:rgba(6,6,4,.85)}.bm:hover .ic{color:var(--acc-ink)}
.bm.on{background:var(--acc-soft);border-color:var(--acc-line)}.bm.on .ic{color:var(--acc-ink);fill:var(--acc-ink)}
.feat .fb{padding:32px 34px;display:flex;flex-direction:column;justify-content:center;gap:16px}
.feat .fb .eb{font-family:var(--fm);font-size:11px;letter-spacing:.24em;color:var(--acc-ink);text-transform:uppercase;display:flex;align-items:center;gap:8px}
.feat .fb .eb .dd{width:6px;height:6px;border-radius:50%;background:var(--acc);box-shadow:0 0 0 3px var(--acc-soft)}
.feat .fb h2{font-family:var(--fh);font-weight:700;font-size:22px;margin:0;line-height:1.12;letter-spacing:-.015em}

.card{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:.16s;display:flex;flex-direction:column}
.card:hover{border-color:var(--line2);transform:translateY(-4px);box-shadow:var(--sh)}
.thumb{position:relative;aspect-ratio:16/9;background:radial-gradient(120% 90% at 50% 8%,#1a1d26,#0a0b0e);overflow:hidden}
.thumb .wm{position:absolute;inset:0;display:grid;place-items:center;z-index:1}.thumb .wm svg{width:62px;height:62px;color:rgba(236,238,242,.13)}
.thumb .play{position:absolute;inset:0;display:grid;place-items:center;opacity:0;transition:.2s}
.card:hover .thumb .play{opacity:1}
.thumb .play span{width:50px;height:50px;border-radius:50%;background:rgba(199,210,225,.18);border:1px solid var(--acc-line);display:grid;place-items:center;backdrop-filter:blur(3px)}
.thumb .play .ic{width:20px;height:20px;color:var(--acc-ink);margin-left:2px}
.pov{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,9,11,.9) 0%,rgba(8,9,11,.42) 40%,rgba(8,9,11,0) 66%);pointer-events:none;z-index:1}
.plogo{position:absolute;right:13px;bottom:13px;width:17px;height:17px;color:rgba(255,255,255,.62);pointer-events:none;z-index:2;filter:drop-shadow(0 1px 4px rgba(0,0,0,.6))}
.ptitle{position:absolute;left:14px;right:44px;bottom:13px;pointer-events:none;z-index:2}
.ptmap{font-family:var(--fh);font-weight:800;font-size:16.5px;line-height:1.15;letter-spacing:-.02em;color:#fff;text-shadow:0 2px 14px rgba(0,0,0,.82);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pttags{margin-top:8px;display:flex;gap:6px;align-items:center}
.pvn{font-family:var(--fh);font-size:11.5px;font-weight:700;letter-spacing:-.005em;color:#D7DFEA;background:rgba(10,13,18,.62);border:1px solid rgba(199,210,225,.28);border-radius:6px;padding:2px 7px;backdrop-filter:blur(4px);font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
.pmu{font-family:var(--fd);font-size:11px;letter-spacing:.05em;color:rgba(255,255,255,.92);background:rgba(255,255,255,.16);border-radius:6px;padding:2px 7px;backdrop-filter:blur(3px)}
.pdur{font-family:var(--fh);font-weight:600;font-size:12px;letter-spacing:-.01em;color:rgba(255,255,255,.86);display:inline-flex;align-items:center;gap:4px;font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
.pdur svg{width:12px;height:12px}
.res{position:absolute;left:12px;top:12px;display:inline-flex;align-items:center;gap:5px;font-family:var(--fd);font-size:11.5px;font-weight:700;letter-spacing:0;padding:5px 10px;border-radius:6px;backdrop-filter:blur(4px)}
.res .ic{width:11px;height:11px}
.res.w{color:#F0CE7A;background:rgba(224,180,65,.17);border:1px solid rgba(224,180,65,.42)}
.res.n{color:var(--ink2);background:rgba(6,6,4,.66);border:1px solid rgba(255,255,255,.07)}
.cbody{padding:15px 16px 16px;display:flex;flex-direction:column;gap:12px;flex:1}
.cmap{font-family:var(--fh);font-weight:800;font-size:18px;line-height:1.18;letter-spacing:-.012em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ctags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-family:var(--fd);font-size:11px;color:var(--dim);background:var(--well);border:1px solid var(--line);padding:4px 9px;border-radius:6px;font-variant-numeric:tabular-nums}
.tag.acc{color:var(--acc-ink);background:var(--acc-soft);border-color:var(--acc-line)}
.teams{display:flex;align-items:center;gap:8px}
.dots{display:flex;gap:4px}
.dots i{width:10px;height:10px;border-radius:50%;display:inline-block;box-shadow:0 0 0 1.5px var(--surface)}
.vs{font-family:var(--fd);font-size:10.5px;color:var(--faint)}
.ric{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:6px;border:1px solid transparent;flex:none;font:800 11px/1 var(--fh)}
.ric svg{width:13px;height:13px}
.ric.ran{background:rgba(74,144,255,.18);color:#7DA8FF;border-color:rgba(74,144,255,.46)}
.ric.zerg{background:rgba(232,74,74,.18);color:#FF8A80;border-color:rgba(232,74,74,.46)}
.ric.toss{background:rgba(240,196,80,.17);color:#F5D07A;border-color:rgba(240,196,80,.44)}
.ric.unk{background:var(--well);color:var(--dim);border-color:var(--line2);font:800 10px var(--fh)}
.lineup{display:flex;align-items:center;gap:10px}
.lnteam{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0}
.lnteam.r{align-items:flex-end}
.lnpl{display:flex;align-items:center;gap:7px;min-width:0;max-width:100%}
.lnteam.r .lnpl{flex-direction:row-reverse}
.lnnm{font-family:var(--fd);font-size:12.5px;font-weight:600;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lnteam.win .lnnm{color:var(--ink)}
.lnvs{font-family:var(--fh);font-weight:700;font-size:11px;color:var(--faint);flex:none;letter-spacing:.03em}
.lineup.comp{align-items:center}
.lncomp{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
.lncomp.r{justify-content:flex-end}
.lnics{display:flex;gap:5px;flex-wrap:wrap}
.lnwin{font-family:var(--fh);font-weight:700;font-size:9.5px;color:var(--acc-ink);letter-spacing:.07em;flex:none}
.feat .lineup .ric{width:22px;height:22px}.feat .lineup .ric svg{width:15px;height:15px}
.feat .lnnm{font-size:13.5px}
.feat .lineup{gap:14px}

.cfoot{display:flex;align-items:center;gap:12px;margin-top:auto;padding-top:6px;font-family:var(--fd);font-size:13px;color:var(--dim);font-variant-numeric:tabular-nums}
.cfoot .up{font-family:var(--fd);font-weight:500;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cfoot .sp{flex:1}
.cfoot .m{display:inline-flex;align-items:center;gap:5px}.cfoot .m .ic{width:14px;height:14px}

}

(async()=>{
  const grid=document.getElementById("grid"),topslot=document.getElementById("topslot");const _hero=document.getElementById("hero");if(_hero){_hero.innerHTML=heroHtml();const _hb=document.getElementById("heroBrowse");if(_hb)_hb.addEventListener("click",e=>{e.preventDefault();const t=document.getElementById("topslot")||grid;if(t)t.scrollIntoView({behavior:"smooth",block:"start"});});}
  const CACHE_KEY="encore_matches_v1";
  function buildGames(rows){
    const _views0=rows.map(gameView);
    return clusterMatches(rows).map(idxs=>{
      const arr=idxs.map(i=>_views0[i]).sort((a,b)=>String(b.uploaded).localeCompare(String(a.uploaded)));
      const rep=Object.assign({},arr.find(x=>x.thumb_url)||arr[0]);
      rep.pov_count=arr.length;
      rep.likes=arr.reduce((s,x)=>s+(x.likes||0),0);
      rep.views=arr.reduce((s,x)=>s+(x.views||0),0);
      rep.uploaded=arr[0].uploaded;
      return rep;
    });
  }
  let allGames=[];
  const SORTS=["최신순","오래된순","인기순","조회순"];
  const FILTERS=[["전체",0],["2v2",4],["3v3",6],["4v4",8]];
  let si=0,fi=0,_fp=true;
  function viewGames(){
    let g=allGames.slice();
    const fnp=FILTERS[fi][1];
    if(fnp)g=g.filter(x=>x.np===fnp);
    const s=SORTS[si];
    if(s==="오래된순")g.sort((a,b)=>String(a.uploaded).localeCompare(String(b.uploaded)));
    else if(s==="인기순")g.sort((a,b)=>(b.likes||0)-(a.likes||0)||String(b.uploaded).localeCompare(String(a.uploaded)));
    else if(s==="조회순")g.sort((a,b)=>(b.views||0)-(a.views||0)||String(b.uploaded).localeCompare(String(a.uploaded)));
    else g.sort((a,b)=>String(b.uploaded).localeCompare(String(a.uploaded)));
    return g;
  }
  function attachCards(){
    const fresh=_fp;
    document.querySelectorAll('.card,.feat').forEach((el,i)=>{if(fresh&&i<14)el.style.animationDelay=(i*38)+'ms';el.addEventListener('click',e=>{const bm=e.target.closest('.bm');if(bm){bm.classList.toggle('on');return;}const h=el.dataset.href;if(h)location.href=h;});});
  }
  function renderGrid(){
    const g=viewGames();
    if(grid)grid.innerHTML=g.length?g.map(card).join(""):'<div class="empty"><div class="ebox"><h2>경기 없음</h2><p>이 조건에 맞는 경기가 없어요.</p></div></div>';
    attachCards();_fp=false;
  }
  function _closeMenus(){document.querySelectorAll('.sctl .menu').forEach(function(m){m.hidden=true;});document.querySelectorAll('.sctl .ctrl.open').forEach(function(b){b.classList.remove('open');b.setAttribute('aria-expanded','false');});}
  function renderTop(){ if(topslot)topslot.innerHTML=''; }
  function renderStats(){
    const el=document.getElementById('statband');if(!el)return;
    const total=allGames.length;
    const hot=allGames.filter(isHot).length;
    const mpov=allGames.filter(x=>(x.pov_count||1)>1).length;
    var fIt=FILTERS.map(function(f,i){return '<button class="mi'+(i===fi?' on':'')+'" role="menuitem" data-fi="'+i+'">'+esc(f[0])+'</button>';}).join('');
    var sIt=SORTS.map(function(o){return '<button class="mi'+(o===SORTS[si]?' on':'')+'" role="menuitem" data-sort="'+esc(o)+'">'+esc(o)+'</button>';}).join('');
    el.innerHTML='<div class="stats">'
      +'<div class="stt a"><b>'+total+'</b><span>기록된 게임</span></div>'

      +'<div class="ctrl-wrap"><button class="ctrl" id="filtBtn" aria-haspopup="menu" aria-expanded="false"><span class="lbl">인원</span><span class="cv">'+esc(FILTERS[fi][0])+'</span>'+IC_CHEV+'</button><div class="menu" id="filtMenu" role="menu" hidden>'+fIt+'</div></div>'
      +'<div class="ctrl-wrap"><button class="ctrl" id="sortBtn" aria-haspopup="menu" aria-expanded="false"><span class="lbl">정렬</span><span class="cv">'+esc(SORTS[si])+'</span>'+IC_CHEV+'</button><div class="menu" id="sortMenu" role="menu" hidden>'+sIt+'</div></div>'
      +'</div>';
    function _bindMenu(btnId,menuId,onPick){
      var bt=document.getElementById(btnId),mn=document.getElementById(menuId);
      if(bt&&mn)bt.addEventListener('click',function(e){e.stopPropagation();var willOpen=mn.hidden;_closeMenus();if(willOpen){mn.hidden=false;bt.classList.add('open');bt.setAttribute('aria-expanded','true');}});

    }
    _bindMenu('filtBtn','filtMenu',function(mi){fi=+mi.dataset.fi;renderStats();renderGrid();});
    _bindMenu('sortBtn','sortMenu',function(mi){var idx=SORTS.indexOf(mi.dataset.sort);if(idx>=0)si=idx;renderStats();renderGrid();});
  }
  document.addEventListener('click',_closeMenus);
  // 1) 캐시가 있으면 즉시 렌더 (네트워크 대기 없음 → 클릭 딜레이 제거)
  let hadCache=false;

    const cached=sessionStorage.getItem(CACHE_KEY);

  }catch(e){}
  if(!hadCache&&grid)grid.innerHTML=skelCards(8);

    console.error("[ENCORE] matches 불러오기 실패:",e);
    if(!hadCache&&grid)grid.innerHTML='<div class="empty"><div class="ebox"><h2>불러오기 실패</h2><p>서버 응답 오류 (HTTP '+((e&&e.message)||'?')+'). 키 또는 권한(RLS) 문제일 수 있어요. 잠시 후 다시 시도해 주세요.</p></div></div>';
    return;
  }
  if(!Array.isArray(rows)||rows.length===0){
    console.warn("[ENCORE] matches 0건 — 쿼리는 성공(200)했으나 빈 결과.");
    try{sessionStorage.removeItem(CACHE_KEY);}catch(e){}
    if(!hadCache&&grid)grid.innerHTML='<div class="empty"><div class="ebox"><h2>아직 경기가 없어요</h2><p>레코더로 게임을 녹화하면 여기에 올라옵니다.<br><span style="color:var(--faint);font-size:13px">이미 녹화했는데 안 보인다면 데이터 연결·권한(RLS) 문제일 수 있어요.</span></p></div></div>';
    return;
  }
  try{sessionStorage.setItem(CACHE_KEY,JSON.stringify(rows));}catch(e){}
  allGames=buildGames(rows);
  renderTop();
  renderStats();
  renderGrid();
  addEventListener('scroll',()=>{const b=document.getElementById('bar');if(b)b.classList.toggle('scrolled',scrollY>8);});
  // ── 카드 호버 영상 프리뷰(데스크탑 전용, 음소거·메타데이터만 선로딩) ──
  if(matchMedia('(hover:hover) and (pointer:fine)').matches){
    let hpT=null,hpV=null;
    function hpKill(){if(hpT){clearTimeout(hpT);hpT=null;}if(hpV){try{hpV.pause();hpV.removeAttribute('src');hpV.load();}catch(e){}if(hpV.parentNode)hpV.parentNode.removeChild(hpV);hpV=null;}}
    document.addEventListener('mouseover',e=>{
      const th=e.target.closest&&e.target.closest('.thumb,.ft');if(!th||th._hpIn)return;
      th._hpIn=true;
      const host=th.closest('.card,.feat');const src=host&&host.dataset.video;
      const leave=()=>{th._hpIn=false;th.removeEventListener('mouseleave',leave);hpKill();};
      th.addEventListener('mouseleave',leave);
      if(!src)return;
      hpKill();
      hpT=setTimeout(()=>{
        const v=document.createElement('video');v.className='hpv';v.muted=true;v.playsInline=true;v.preload='metadata';v.src=src;
        v.addEventListener('loadedmetadata',()=>{try{const d=v.duration||0;if(isFinite(d)&&d>90)v.currentTime=Math.min(60,d*0.2);}catch(_){ }const pp=v.play();if(pp&&pp.catch)pp.catch(()=>{});});
        v.addEventListener('playing',()=>v.classList.add('on'));
        th.appendChild(v);hpV=v;
      },420);
    });
  }
})();
</script></body></html>
