name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build single EXE
        run: >
          pyinstaller --onefile --windowed --name sc_recorder --noupx
          --hidden-import psutil --hidden-import requests --hidden-import tkinter
          --hidden-import pyaudiowpatch --hidden-import windows_capture --collect-all windows_capture
          --exclude-module boto3 --exclude-module botocore
          --exclude-module flask --exclude-module werkzeug --exclude-module jinja2
          --exclude-module waitress
          --exclude-module cv2 --exclude-module opencv-python --exclude-module matplotlib
          sc_recorder.py

      - name: Zip the EXE (브라우저의 .exe 다운로드 차단 회피용)
        shell: pwsh
        run: |
          Compress-Archive -Path dist/sc_recorder.exe -DestinationPath dist/sc_recorder.zip -Force
          if (-not (Test-Path dist/sc_recorder.zip)) { throw "sc_recorder.zip 생성 실패" }
          Get-ChildItem dist | Format-Table Name, Length

      - name: 기존 latest 릴리즈/태그 정리 (날짜 갱신 + 옛 .exe 제거)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --yes --cleanup-tag || true

      - name: Publish "latest" release (zip만 게시)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 최신 빌드 (latest)
          body: |
            sc_recorder.zip 받아서 압축 풀고 sc_recorder.exe 실행 — 파이썬 설치 불필요.
            보안 경고가 뜨면 "추가 정보 → 실행". 최초 실행 시 ffmpeg를 한 번 자동으로 내려받아요(1~2분).
          files: dist/sc_recorder.zip
          make_latest: true
